<html lang="nl">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#f5f6f8;--bg2:#fff;--bg3:#f0f1f4;--bg4:#e8eaef;
            --tx:#1a1d27;--tx2:#4a4f63;--tx3:#8890a4;
            --bdr:#dfe1e8;--bdr2:#c8ccd6;
            --acc:#1a6bff;--acc2:#0d4fcc;--accBg:#eef4ff;
            --ent:#0066cc;--attr:#16803c;--deckE:#8b5cf6;
            --ok:#16a34a;--warn:#d97706;--err:#dc2626;
            --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
            --shadow2:0 4px 16px rgba(0,0,0,.08);
            --radius:8px;
        }
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
        input,select,textarea{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg2);color:var(--tx);outline:none;transition:border-color .15s}
        input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,107,255,.12)}
        input::placeholder,textarea::placeholder{color:var(--tx3)}
        button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:13px}
        button:disabled{opacity:.4;cursor:not-allowed}
        code{font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px}
        mark{background:#fef08a;padding:0 2px;border-radius:2px}

        .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-weight:500;transition:all .15s}
        .btn-primary{background:var(--acc);color:#fff}.btn-primary:hover{background:var(--acc2)}
        .btn-secondary{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}.btn-secondary:hover{background:var(--bg4)}
        .btn-danger{background:#fee2e2;color:var(--err)}.btn-danger:hover{background:#fecaca}
        .btn-sm{padding:4px 10px;font-size:12px}
        .btn-xs{padding:2px 8px;font-size:11px}

        .badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
        .badge-ent{background:#dbeafe;color:var(--ent)}
        .badge-attr{background:#dcfce7;color:var(--attr)}
        .badge-deck{background:#ede9fe;color:var(--deckE)}
        .badge-v{background:#dcfce7;color:#166534}.badge-o{background:#fef9c3;color:#854d0e}
        .badge-card{background:var(--bg3);color:var(--tx2)}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
        .modal{background:var(--bg2);border-radius:12px;box-shadow:var(--shadow2);width:100%;display:flex;flex-direction:column;overflow:hidden}
        .modal-sm{max-width:480px;max-height:70vh}
        .modal-md{max-width:640px;max-height:85vh}
        .modal-lg{max-width:900px;max-height:90vh}
        .modal-header{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .modal-body{flex:1;overflow-y:auto;padding:20px;min-height:0}
        .modal-footer{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

        .tree-item{border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:4px;background:var(--bg2);transition:box-shadow .15s}
        .tree-item:hover{box-shadow:var(--shadow)}

        .tree-header:hover{background:var(--bg3)}

        .func-cell.active-o{background:#fef9c3;color:#854d0e;font-weight:600}
        .func-cell.active-card{background:#dbeafe;color:#1e40af;font-weight:600;font-size:10px}

        .sidebar{width:320px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
        .sidebar-header{padding:12px 16px;border-bottom:1px solid var(--bdr);font-weight:600;display:flex;align-items:center;justify-content:space-between}
        .sidebar-body{flex:1;overflow-y:auto;padding:16px}

        .field-group{margin-bottom:14px}
        .field-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}

        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
        .fade-in{animation:fadeIn .15s ease-out}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spin{animation:spin .8s linear infinite}

        .toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow2)}
        .toast-ok{background:var(--ok)}.toast-err{background:var(--err)}.toast-warn{background:var(--warn)}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

// ════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════

const FUNCTIES = ['premieBerekening_aanroep','premieBerekening_resultaat','acceptatie_aanroep','acceptatie_resultaat','polisbladGegevens','kunnenAanleveren'];
const FUNC_SHORT = ['PB_A','PB_R','AC_A','AC_R','POL','KA'];
const CARD_OPTIONS = ['','0-1','0-9','1-1','1-9'];
const VO_OPTIONS = ['','V','O'];

// ════════════════════════════════════════════════════
//  AFM PARSERS (from datacatalogus tool)
// ════════════════════════════════════════════════════

function parseDatacatAFM(text){
    const lines=text.split(/\r?\n/).filter(l=>l.length>=64);
    const items=[];
    for(const line of lines){
        const type=line[0];
        if(type!=='E'&&type!=='A')continue;
        const entCode=line.substring(1,3).trim();
        const naam=line.substring(28,64).trim();
        const omschr=line.substring(64).trim();
        if(type==='E'){
            items.push({type:'E',entCode,attrCode:'',naam,omschr,datatype:'',formaat:'',codelijst:''});
        } else {
            const attrCode=line.substring(5,12).trim();
            const pDt=line.substring(12,14).trim();
            const fmt=line.substring(14,19).trim();
            const sDt=line.substring(19,21).trim();
            const cl=line.substring(21,28).trim();
            items.push({type:'A',entCode,attrCode,naam,omschr,datatype:sDt||pDt,formaat:fmt?pDt+fmt:pDt,codelijst:cl});
        }
    }
    return items;
}

function parseCodelistAFM(text){
    const lines=text.split(/\r?\n/).filter(l=>l.length>=8);
    const groups={},descs={};
    for(const line of lines){
        const t=line[0],name=line.substring(1,7).trim();
        if(!name)continue;
        if(t==='L'){
            const rest=line.substring(7).trim();
            descs[name]=rest.length>1?rest.substring(0,rest.length-1).trim():'';
            if(!groups[name])groups[name]=[];
        } else if(t==='C'){
            if(!groups[name])groups[name]=[];
            const raw=line.substring(7);
            let code,oms;
            if(raw.length>4&&raw[4]===' '){code=raw.substring(0,4).trim();oms=raw.substring(5).trim();}
            else{const si=raw.indexOf(' ');if(si>0){code=raw.substring(0,si).trim();oms=raw.substring(si+1).trim();}else{code=raw.trim();oms='';}}
            if(code)groups[name].push({code,oms});
        }
    }
    return {groups,descs};
}

// ════════════════════════════════════════════════════
//  TEMPLATE IMPORT/EXPORT
// ════════════════════════════════════════════════════

function importTemplate(arrayBuffer){
    const wb=XLSX.read(arrayBuffer,{type:'array',cellDates:true});
    const result={meta:{},schema:[],functies:FUNCTIES.slice()};

    // Parse Metagegevens
    if(wb.SheetNames.includes('Metagegevens en Updates')){
        const ws=wb.Sheets['Metagegevens en Updates'];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        for(const row of rows){
            const key=String(row[0]||'').replace(':','').trim();
            const val=row[1]||'';
            if(key==='Naam organisatie')result.meta.organisatie=val;
            if(key==='Commerciele productnaam')result.meta.productnaam=val;
            if(key==='Contactpersoon')result.meta.contactpersoon=val;
            if(key.includes('E-mail'))result.meta.email=val;
            if(key==='Datum')result.meta.datum=val;
        }
    }

    // Parse Schema
    if(wb.SheetNames.includes('Schema')){
        const ws=wb.Sheets['Schema'];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        
        // Find header row
        let headerIdx=-1;
        for(let i=0;i<Math.min(15,rows.length);i++){
            if(rows[i]&&rows[i][0]==='Pad'){headerIdx=i;break;}
        }
        if(headerIdx<0)return result;

        // Parse properties (rows before header)
        for(let i=0;i<headerIdx;i++){
            const key=String(rows[i][0]||'').replace(':','').trim();
            const val=rows[i][1]||'';
            if(key==='Branche')result.meta.branche=val;
            if(key==='POR maatschappij aanduiding')result.meta.porCode=val;
            if(key==='AFD-definitie naam')result.meta.afdNaam=val;
            if(key==='AFD-definitie versienummer')result.meta.afdVersie=val;
            if(key==='AFD-definitie tag')result.meta.afdTag=val;
            if(key.includes('Productsegment'))result.meta.segment=val;
        }

        // Parse schema rows
        for(let i=headerIdx+1;i<rows.length;i++){
            const row=rows[i];
            const pad=String(row[0]||'').trim();
            const label=String(row[1]||'').trim();
            if(!pad||!label)continue;

            const pathLast=pad.split('/').pop();
            const isEntity=label===pathLast&&!label.includes('_');

            const funcValues={};
            FUNCTIES.forEach((fn,j)=>{
                const v=String(row[10+j]||'').trim();
                if(v)funcValues[fn]=v;
            });

            result.schema.push({
                pad,label,
                omschrijving:String(row[2]||'').trim(),
                codelijst:String(row[3]||'').trim(),
                actueleCodelijst:String(row[4]||'').trim(),
                subsetCodelijst:String(row[5]||'').trim(),
                optielijst:String(row[6]||'').trim(),
                minimum:row[7]!==''&&row[7]!=null?row[7]:'',
                maximum:row[8]!==''&&row[8]!=null?row[8]:'',
                eigenOmschrijving:String(row[9]||'').trim(),
                functies:funcValues,
                isEntity
            });
        }
    }
    return result;
}

function exportTemplate(meta,schema){
    const wb=XLSX.utils.book_new();

    // Sheet 1: Metagegevens
    const metaRows=[
        [null,'Metagegevens AFD-definitie en Updates Excel-template en product'],
        ['Metagegevens AFD-definitie'],
        [],
        ['Naam organisatie:',meta.organisatie||''],
        ['Commerciele productnaam:',meta.productnaam||''],
        ['Bronnen:',meta.bronnen||''],
        ['Contactpersoon:',meta.contactpersoon||''],
        ['E-mail / Telefoon:',meta.email||''],
        ['Datum:',meta.datum||''],
    ];
    const wsMeta=XLSX.utils.aoa_to_sheet(metaRows);
    wsMeta['!cols']=[{wch:28},{wch:40},{wch:50}];
    XLSX.utils.book_append_sheet(wb,wsMeta,'Metagegevens en Updates');

    // Sheet 2: Schema
    const schemaRows=[
        ['Eigenschappen AFD-definitie'],
        [],
        ['Branche:',meta.branche||''],
        ['POR maatschappij aanduiding:',meta.porCode||''],
        ['AFD-definitie naam:',meta.afdNaam||''],
        ['AFD-definitie versienummer:',meta.afdVersie||''],
        ['AFD-definitie tag:',meta.afdTag||''],
        ['Productsegment Particulier/Zakelijk:',meta.segment||''],
        [],
        ['Pad','Label','Omschrijving','Codelijst','Actuele codelijst','Subset codelijst','Optielijst','Minimum','Maximum','Eigen omschrijving',...FUNCTIES]
    ];

    for(const item of schema){
        const row=[
            item.pad,item.label,item.omschrijving,item.codelijst,
            item.actueleCodelijst||'',item.subsetCodelijst||'',item.optielijst||'',
            item.minimum!==''?item.minimum:'',item.maximum!==''?item.maximum:'',
            item.eigenOmschrijving||''
        ];
        FUNCTIES.forEach(fn=>{
            row.push(item.functies[fn]||'');
        });
        schemaRows.push(row);
    }

    const wsSchema=XLSX.utils.aoa_to_sheet(schemaRows);
    wsSchema['!cols']=[{wch:16},{wch:16},{wch:42},{wch:12},{wch:14},{wch:16},{wch:14},{wch:10},{wch:10},{wch:24},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,wsSchema,'Schema');

    // Sheet 3: Functielijst
    const funcRows=[['Kolom1'],['Functielijst'],...FUNCTIES.map(f=>[f])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(funcRows),'Functielijst');

    return wb;
}

// ════════════════════════════════════════════════════
//  HELPER: unique ID
// ════════════════════════════════════════════════════
let _id=0;
const uid=()=>'_'+(_id++);

// ════════════════════════════════════════════════════
//  MAIN APP
// ════════════════════════════════════════════════════

function App(){
    // Datacatalogus data
    const [dcData,setDcData]=useState([]);
    const [clGroups,setClGroups]=useState({});
    const [clDescs,setClDescs]=useState({});
    const [dcLoading,setDcLoading]=useState(true);
    const [dcError,setDcError]=useState(null);

    // Product definition state
    const [meta,setMeta]=useState({branche:'',porCode:'',afdNaam:'',afdVersie:'',afdTag:'',segment:'Zakelijk',organisatie:'',productnaam:'',contactpersoon:'',email:'',datum:''});
    const [schema,setSchema]=useState([]);
    const [selectedItem,setSelectedItem]=useState(null);

    // UI state
    const [view,setView]=useState('start'); // start, editor
    const [toast,setToast]=useState(null);
    const [showAddEntity,setShowAddEntity]=useState(false);
    const [showAddAttr,setShowAddAttr]=useState(null); // pad string
    const [expandedEntities,setExpandedEntities]=useState(new Set());
    const [searchTerm,setSearchTerm]=useState('');
    const [showMeta,setShowMeta]=useState(false);
    const [showCodelist,setShowCodelist]=useState(null);

    // ── Load datacatalogus ──
    useEffect(()=>{
        (async()=>{
            try{
                const r1=await fetch('Datacat.afm');
                if(!r1.ok)throw new Error('Datacat.afm niet gevonden');
                setDcData(parseDatacatAFM(await r1.text()));
                try{
                    const r2=await fetch('Codelist.afm');
                    if(r2.ok){const{groups,descs}=parseCodelistAFM(await r2.text());setClGroups(groups);setClDescs(descs);}
                }catch(e){console.warn('Codelist:',e)}
                setDcLoading(false);
            }catch(e){setDcError(e.message);setDcLoading(false);}
        })();
    },[]);

    // Toast helper
    const showToast=useCallback((msg,type='ok')=>{
        setToast({msg,type});
        setTimeout(()=>setToast(null),3000);
    },[]);

    // ── DC lookups ──
    const dcEntities=useMemo(()=>dcData.filter(d=>d.type==='E'),[dcData]);
    const dcByEntity=useMemo(()=>{
        const m={};
        dcData.forEach(d=>{if(d.type==='A'){if(!m[d.entCode])m[d.entCode]=[];m[d.entCode].push(d);}});
        return m;
    },[dcData]);
    const dcEntityMap=useMemo(()=>{
        const m={};
        dcEntities.forEach(e=>{m[e.entCode]=e;});
        return m;
    },[dcEntities]);

    // ── Schema helpers ──
    const schemaTree=useMemo(()=>{
        // Build a tree from flat schema
        const entities=[];
        let currentEntity=null;
        for(const item of schema){
            if(item.isEntity){
                currentEntity={...item,attributes:[],_id:item._id||uid()};
                entities.push(currentEntity);
            } else if(currentEntity){
                currentEntity.attributes.push({...item,_id:item._id||uid()});
            }
        }
        return entities;
    },[schema]);

    // Flatten tree back to schema
    const updateSchema=useCallback((newTree)=>{
        const flat=[];
        for(const ent of newTree){
            const{attributes,...entData}=ent;
            flat.push({...entData,isEntity:true});
            for(const attr of attributes){
                flat.push({...attr,isEntity:false});
            }
        }
        setSchema(flat);
    },[]);

    // ── Import template ──
    const handleImport=useCallback((e)=>{
        const file=e.target.files[0];
        if(!file)return;
        const reader=new FileReader();
        reader.onload=(ev)=>{
            try{
                const result=importTemplate(ev.target.result);
                setMeta(m=>({...m,...result.meta}));
                // Add _id to each item
                const withIds=result.schema.map(item=>({...item,_id:uid()}));
                setSchema(withIds);
                // Expand all entities by default
                const entPads=new Set(withIds.filter(i=>i.isEntity).map(i=>i.pad+'_'+i.label));
                setExpandedEntities(entPads);
                setView('editor');
                showToast(`Template "${file.name}" geïmporteerd (${withIds.length} items)`);
            }catch(err){
                showToast('Fout bij importeren: '+err.message,'err');
            }
        };
        reader.readAsArrayBuffer(file);
        e.target.value='';
    },[showToast]);

    // ── Export template ──
    const handleExport=useCallback(()=>{
        try{
            const wb=exportTemplate(meta,schema);
            const filename=`${meta.afdNaam||'productdefinitie'}.xlsx`;
            XLSX.writeFile(wb,filename);
            showToast(`Geëxporteerd als ${filename}`);
        }catch(err){
            showToast('Fout bij exporteren: '+err.message,'err');
        }
    },[meta,schema,showToast]);

    // ── New from scratch ──
    const handleNewProject=useCallback(()=>{
        // Start with common entities
        const commonEntities=[
            {pad:'AL',label:'AL',omschrijving:'BERICHT ALGEMEEN',isEntity:true,functies:{'premieBerekening_aanroep':'1-1','premieBerekening_resultaat':'1-1','acceptatie_aanroep':'1-1','acceptatie_resultaat':'1-1','polisbladGegevens':'1-1','kunnenAanleveren':'1-1'}},
            {pad:'AL',label:'AL_DATACAT',omschrijving:'Versie datacatalogus',codelijst:'ADNAFM',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'AL',label:'AL_FUNCTIE',omschrijving:'Berichtfunctie, code',codelijst:'ADNFUN',isEntity:false,functies:{}},
            {pad:'AL',label:'AL_VERSIEV',omschrijving:'Versienummer view, code',codelijst:'ADNVER',isEntity:false,functies:{}},
            {pad:'AL',label:'AL_VIEWCOD',omschrijving:'Soort view, code',codelijst:'ADNVIE',isEntity:false,functies:{}},
            {pad:'AL',label:'AL_VRWRKCD',omschrijving:'Verwerkingscode entiteit',codelijst:'ADNVRC',isEntity:false,functies:{}},
            {pad:'PP',label:'PP',omschrijving:'CONTRACT POLIS/ONDERDEEL',isEntity:true,functies:{kunnenAanleveren:'1-1'}},
            {pad:'PP',label:'PP_ADEFVRS',omschrijving:'AFD definitieversienummer',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_AFDDEFN',omschrijving:'AFD definitienaam',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_AFDDTAG',omschrijving:'AFD-definitie tag',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_BRANCHE',omschrijving:'ADN branchecode',codelijst:'ADNBRA',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_INGDAT',omschrijving:'Ingangsdatum',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_NUMMER',omschrijving:'Contractnummer',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP',label:'PP_MYAAND',omschrijving:'POR Maatschappij aanduiding, code',codelijst:'PORMAA',isEntity:false,functies:{kunnenAanleveren:'V'}},
            {pad:'PP/VP',label:'VP',omschrijving:'PARTIJ VERZEKERINGNEMER',isEntity:true,functies:{kunnenAanleveren:'1-1'}},
            {pad:'PP/VE',label:'VE',omschrijving:'PARTIJ VOLMACHTNEMER',isEntity:true,functies:{kunnenAanleveren:'1-1'}},
            {pad:'PP/VL',label:'VL',omschrijving:'PARTIJ VOLMACHTGEVER',isEntity:true,functies:{kunnenAanleveren:'1-1'}},
        ].map(item=>({...item,_id:uid(),codelijst:item.codelijst||'',actueleCodelijst:'',subsetCodelijst:'',optielijst:'',minimum:'',maximum:'',eigenOmschrijving:''}));

        setSchema(commonEntities);
        setExpandedEntities(new Set(commonEntities.filter(i=>i.isEntity).map(i=>i.pad+'_'+i.label)));
        setView('editor');
        showToast('Nieuw project gestart met basisentiteiten');
    },[showToast]);

    // ── Add entity ──
    const addEntity=useCallback((entCode,parentPad)=>{
        const dcEnt=dcEntityMap[entCode];
        if(!dcEnt)return;
        const pad=parentPad?`${parentPad}/${entCode}`:entCode;
        const newEnt={
            _id:uid(),pad,label:entCode,omschrijving:dcEnt.naam,codelijst:'',
            actueleCodelijst:'',subsetCodelijst:'',optielijst:'',minimum:'',maximum:'',eigenOmschrijving:'',
            functies:{},isEntity:true
        };
        setSchema(prev=>[...prev,newEnt]);
        setExpandedEntities(prev=>{const n=new Set(prev);n.add(pad+'_'+entCode);return n;});
        showToast(`Entiteit ${entCode} (${dcEnt.naam}) toegevoegd`);
    },[dcEntityMap,showToast]);

    // ── Add attribute ──
    const addAttribute=useCallback((entCode,attrCode,targetPad)=>{
        const dcAttr=(dcByEntity[entCode]||[]).find(a=>a.attrCode===attrCode);
        if(!dcAttr)return;
        const label=`${entCode}_${attrCode}`;
        // Check if already exists
        if(schema.some(s=>s.pad===targetPad&&s.label===label)){
            showToast(`${label} bestaat al in ${targetPad}`,'warn');
            return;
        }
        const newAttr={
            _id:uid(),pad:targetPad,label,omschrijving:dcAttr.naam,codelijst:dcAttr.codelijst,
            actueleCodelijst:'',subsetCodelijst:'',optielijst:'',minimum:'',maximum:'',eigenOmschrijving:'',
            functies:{},isEntity:false
        };
        // Insert after the last item with same pad
        setSchema(prev=>{
            const copy=[...prev];
            let insertIdx=copy.length;
            for(let i=copy.length-1;i>=0;i--){
                if(copy[i].pad===targetPad){insertIdx=i+1;break;}
            }
            copy.splice(insertIdx,0,newAttr);
            return copy;
        });
        showToast(`${label} toegevoegd`);
    },[dcByEntity,schema,showToast]);

    // ── Remove item ──
    const removeItem=useCallback((itemId)=>{
        setSchema(prev=>{
            const item=prev.find(s=>s._id===itemId);
            if(!item)return prev;
            if(item.isEntity){
                // Remove entity and all its children
                return prev.filter(s=>s._id!==itemId&&!(s.pad===item.pad&&!s.isEntity&&prev.indexOf(s)>prev.indexOf(item)));
            }
            return prev.filter(s=>s._id!==itemId);
        });
        if(selectedItem===itemId)setSelectedItem(null);
        showToast('Item verwijderd');
    },[selectedItem,showToast]);

    // ── Update item ──
    const updateItem=useCallback((itemId,updates)=>{
        setSchema(prev=>prev.map(s=>s._id===itemId?{...s,...updates}:s));
    },[]);

    // ── Toggle func value ──
    const toggleFunc=useCallback((itemId,funcName,isEntity)=>{
        setSchema(prev=>prev.map(s=>{
            if(s._id!==itemId)return s;
            const current=s.functies[funcName]||'';
            let next;
            if(isEntity){
                // Cycle: '' -> 0-1 -> 1-1 -> 0-9 -> 1-9 -> ''
                const ci=CARD_OPTIONS.indexOf(current);
                next=CARD_OPTIONS[(ci+1)%CARD_OPTIONS.length];
            } else {
                // Cycle: '' -> V -> O -> ''
                const ci=VO_OPTIONS.indexOf(current);
                next=VO_OPTIONS[(ci+1)%VO_OPTIONS.length];
            }
            return {...s,functies:{...s.functies,[funcName]:next}};
        }));
    },[]);

    // ════════════════════════════════════════════════
    //  RENDER
    // ════════════════════════════════════════════════

    if(dcLoading){
        return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}>
            <div className="spin" style={{width:36,height:36,border:'3px solid var(--bdr)',borderTopColor:'var(--acc)',borderRadius:'50%'}}/>
            <span style={{color:'var(--tx3)'}}>Datacatalogus laden...</span>
        </div>;
    }

    if(view==='start'){
        return <StartScreen dcError={dcError} dcCount={dcData.length} onImport={handleImport} onNew={handleNewProject}/>;
    }

    const selItem=schema.find(s=>s._id===selectedItem);

    return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
        {/* Main area */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {/* Toolbar */}
            <div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)',background:'var(--bg2)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>{if(confirm('Terug naar start? Niet-opgeslagen wijzigingen gaan verloren.'))setView('start')}}>
                    ← Terug
                </button>
                <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
                    <strong style={{fontSize:15}}>{meta.afdNaam||'Nieuw product'}</strong>
                    {meta.branche&&<span className="badge badge-card">{meta.branche}</span>}
                    <span style={{fontSize:12,color:'var(--tx3)'}}>{schema.length} items</span>
                </div>
                <button className="btn btn-secondary btn-sm" onClick={()=>setShowMeta(true)}>⚙ Metagegevens</button>
                <button className="btn btn-secondary btn-sm" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx';inp.onchange=handleImport;inp.click();}}>📥 Import</button>
                <button className="btn btn-primary btn-sm" onClick={handleExport} disabled={schema.length===0}>📤 Export .xlsx</button>
            </div>

            {/* Schema tree + controls */}
            <div style={{flex:1,overflow:'auto',padding:16}}>
                {/* Function column headers */}
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,paddingRight:320}}>
                    <div style={{flex:1}}/>
                    <div className="func-grid" style={{width:180}}>
                        {FUNC_SHORT.map((fn,i)=><div key={i} style={{textAlign:'center',fontSize:10,color:'var(--tx3)',fontWeight:600}} title={FUNCTIES[i]}>{fn}</div>)}
                    </div>
                    <div style={{width:60}}/>
                </div>

                {/* Entity tree */}
                {schemaTree.map(ent=>{
                    const key=ent.pad+'_'+ent.label;
                    const isExpanded=expandedEntities.has(key);
                    const isDekking=ent.omschrijving?.toUpperCase().includes('DEKKING');
                    return <div key={ent._id} className={`tree-item tree-entity ${isDekking?'deck':''}`}>
                        <div className="tree-header" onClick={()=>{
                            setExpandedEntities(prev=>{const n=new Set(prev);if(n.has(key))n.delete(key);else n.add(key);return n;});
                        }}>
                            <span style={{fontSize:10,color:'var(--tx3)',transition:'transform .15s',transform:isExpanded?'rotate(90deg)':'none'}}>▶</span>
                            <span className={`badge ${isDekking?'badge-deck':'badge-ent'}`}>{ent.label}</span>
                            <span style={{flex:1,fontSize:13,fontWeight:500}}>{ent.omschrijving}</span>
                            <code style={{fontSize:11,color:'var(--tx3)'}}>{ent.pad}</code>
                            {/* Func cells for entity (cardinality) */}
                            <div className="func-grid" style={{width:180}}>
                                {FUNCTIES.map((fn,i)=>{
                                    const v=ent.functies[fn]||'';
                                    return <div key={fn} className={`func-cell ${v?'active-card':''}`}
                                        onClick={(e)=>{e.stopPropagation();toggleFunc(ent._id,fn,true);}}
                                        title={`${FUNCTIES[i]}: ${v||'(leeg)'}`}>{v||'·'}</div>;
                                })}
                            </div>
                            <div style={{display:'flex',gap:2,width:60}}>
                                <button className="btn-xs btn-secondary" onClick={(e)=>{e.stopPropagation();setShowAddAttr(ent);}} title="Attribuut toevoegen">+A</button>
                                <button className="btn-xs btn-danger" onClick={(e)=>{e.stopPropagation();if(confirm(`${ent.label} verwijderen?`))removeItem(ent._id);}} title="Verwijderen">×</button>
                            </div>
                        </div>
                        {isExpanded&&ent.attributes.length>0&&(
                            <div className="tree-children fade-in">
                                {ent.attributes.map(attr=>{
                                    const isSelected=selectedItem===attr._id;
                                    return <div key={attr._id} className="tree-attr" style={{background:isSelected?'var(--accBg)':'transparent',borderRadius:6,cursor:'pointer'}}
                                        onClick={()=>setSelectedItem(isSelected?null:attr._id)}>
                                        <span className="badge badge-attr" style={{minWidth:90,justifyContent:'center'}}>{attr.label}</span>
                                        <span style={{flex:1,fontSize:12,color:'var(--tx2)'}}>{attr.omschrijving}</span>
                                        {attr.codelijst&&<code style={{fontSize:10}}>{attr.codelijst}</code>}
                                        {(attr.subsetCodelijst||attr.optielijst||attr.minimum!==''||attr.maximum!=='')&&
                                            <span style={{fontSize:10,color:'var(--warn)'}}>⚡</span>}
                                        {/* Func cells */}
                                        <div className="func-grid" style={{width:180}}>
                                            {FUNCTIES.map(fn=>{
                                                const v=attr.functies[fn]||'';
                                                return <div key={fn} className={`func-cell ${v==='V'?'active-v':v==='O'?'active-o':''}`}
                                                    onClick={(e)=>{e.stopPropagation();toggleFunc(attr._id,fn,false);}}>{v||'·'}</div>;
                                            })}
                                        </div>
                                        <button className="btn-xs btn-danger" onClick={(e)=>{e.stopPropagation();removeItem(attr._id);}} style={{fontSize:10}}>×</button>
                                    </div>;
                                })}
                            </div>
                        )}
                    </div>;
                })}

                {/* Add entity button */}
                <button className="btn btn-secondary" style={{marginTop:12,width:'100%',justifyContent:'center'}} onClick={()=>setShowAddEntity(true)}>
                    + Entiteit toevoegen
                </button>
            </div>
        </div>

        {/* Sidebar: detail editor */}
        <div className="sidebar">
            <div className="sidebar-header">
                <span>{selItem?`${selItem.label}`:'Detail'}</span>
                {selItem&&<button style={{color:'var(--tx3)',fontSize:16}} onClick={()=>setSelectedItem(null)}>×</button>}
            </div>
            <div className="sidebar-body">
                {!selItem?(
                    <div style={{color:'var(--tx3)',textAlign:'center',padding:'40px 20px'}}>
                        <p style={{fontSize:13}}>Selecteer een attribuut om waardebeperkingen en details te bewerken</p>
                    </div>
                ):(
                    <div className="fade-in">
                        <div className="field-group">
                            <div className="field-label">Label</div>
                            <code style={{fontSize:13}}>{selItem.label}</code>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Omschrijving</div>
                            <input type="text" value={selItem.omschrijving} onChange={e=>updateItem(selItem._id,{omschrijving:e.target.value})} style={{width:'100%'}}/>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Codelijst</div>
                            <div className="field-row">
                                <input type="text" value={selItem.codelijst} onChange={e=>updateItem(selItem._id,{codelijst:e.target.value})} style={{flex:1}} placeholder="bijv. ADNBRA"/>
                                {selItem.codelijst&&clGroups[selItem.codelijst]&&(
                                    <button className="btn btn-secondary btn-xs" onClick={()=>setShowCodelist(selItem.codelijst)}>
                                        👁 {clGroups[selItem.codelijst].length}
                                    </button>
                                )}
                            </div>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Actuele codelijst</div>
                            <select value={selItem.actueleCodelijst||''} onChange={e=>updateItem(selItem._id,{actueleCodelijst:e.target.value})} style={{width:'100%'}}>
                                <option value="">—</option>
                                <option value="Ja">Ja</option>
                                <option value="Nee">Nee</option>
                            </select>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Subset codelijst</div>
                            <input type="text" value={selItem.subsetCodelijst||''} onChange={e=>updateItem(selItem._id,{subsetCodelijst:e.target.value})} style={{width:'100%'}} placeholder="bijv. B;D;G;H"/>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Optielijst</div>
                            <input type="text" value={selItem.optielijst||''} onChange={e=>updateItem(selItem._id,{optielijst:e.target.value})} style={{width:'100%'}} placeholder="bijv. 250;500;1000"/>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Minimum / Maximum</div>
                            <div className="field-row">
                                <input type="text" value={selItem.minimum} onChange={e=>updateItem(selItem._id,{minimum:e.target.value})} placeholder="Min" style={{flex:1}}/>
                                <input type="text" value={selItem.maximum} onChange={e=>updateItem(selItem._id,{maximum:e.target.value})} placeholder="Max" style={{flex:1}}/>
                            </div>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Eigen omschrijving</div>
                            <textarea value={selItem.eigenOmschrijving||''} onChange={e=>updateItem(selItem._id,{eigenOmschrijving:e.target.value})} style={{width:'100%',minHeight:60,resize:'vertical',border:'1px solid var(--bdr)',borderRadius:6,padding:'6px 10px',fontSize:13}} placeholder="Eigen omschrijving..."/>
                        </div>
                        <div className="field-group">
                            <div className="field-label">Functies</div>
                            <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                {FUNCTIES.map((fn,i)=>{
                                    const v=selItem.functies[fn]||'';
                                    return <div key={fn} style={{display:'flex',alignItems:'center',gap:8}}>
                                        <span style={{fontSize:11,color:'var(--tx3)',width:36}}>{FUNC_SHORT[i]}</span>
                                        <select value={v} onChange={e=>{
                                            const nv=e.target.value;
                                            updateItem(selItem._id,{functies:{...selItem.functies,[fn]:nv}});
                                        }} style={{flex:1,fontSize:12}}>
                                            {selItem.isEntity?
                                                CARD_OPTIONS.map(o=><option key={o} value={o}>{o||'(leeg)'}</option>):
                                                VO_OPTIONS.map(o=><option key={o} value={o}>{o||'(leeg)'}</option>)
                                            }
                                        </select>
                                    </div>;
                                })}
                            </div>
                        </div>
                    </div>
                )}
            </div>
        </div>

        {/* Modals */}
        {showAddEntity&&<AddEntityModal dcEntities={dcEntities} schema={schema} onAdd={(code,pad)=>{addEntity(code,pad);setShowAddEntity(false);}} onClose={()=>setShowAddEntity(false)}/>}
        {showAddAttr&&<AddAttrModal entity={showAddAttr} dcByEntity={dcByEntity} schema={schema} onAdd={(entCode,attrCode,pad)=>{addAttribute(entCode,attrCode,pad);}} onClose={()=>setShowAddAttr(null)}/>}
        {showMeta&&<MetaModal meta={meta} onSave={m=>{setMeta(m);setShowMeta(false);showToast('Metagegevens opgeslagen');}} onClose={()=>setShowMeta(false)}/>}
        {showCodelist&&<CodelistModal name={showCodelist} items={clGroups[showCodelist]||[]} desc={clDescs[showCodelist]||''} onClose={()=>setShowCodelist(null)}/>}
        {toast&&<div className={`toast toast-${toast.type} fade-in`}>{toast.msg}</div>}
    </div>;
}

function StartScreen({dcError,dcCount,onImport,onNew}){
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}>
        <div style={{maxWidth:520,width:'100%',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>📋</div>
            <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>AFD Productdefinitie Builder</h1>
            <p style={{color:'var(--tx3)',marginBottom:28,fontSize:13}}>
                Bouw en beheer SIVI AOS productdefinities in AFD 1.0 formaat
                {dcCount>0&&<span> • {dcCount.toLocaleString()} items in datacatalogus</span>}
            </p>
            {dcError&&<div style={{background:'#fee2e2',color:'var(--err)',padding:'10px 16px',borderRadius:8,marginBottom:16,fontSize:13}}>⚠️ {dcError}</div>}

            <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <button className="btn btn-primary" style={{justifyContent:'center',padding:'14px 20px',fontSize:15}} onClick={onNew}>
                    🆕 Nieuw project starten
                </button>
                <label className="btn btn-secondary" style={{justifyContent:'center',padding:'14px 20px',fontSize:15,cursor:'pointer'}}>
                    📥 SIVI-template importeren (.xlsx)
                    <input type="file" accept=".xlsx" onChange={onImport} style={{display:'none'}}/>
                </label>
            </div>

            <div style={{marginTop:28,padding:'16px 20px',background:'var(--bg2)',borderRadius:10,border:'1px solid var(--bdr)',textAlign:'left',fontSize:12,color:'var(--tx3)',lineHeight:1.8}}>
                <strong style={{color:'var(--tx2)'}}>Benodigde bestanden (in dezelfde map):</strong><br/>
                <code>Datacat.afm</code> — AFD 1.0 datacatalogus {dcCount>0?'✅':'❌'}<br/>
                <code>Codelist.afm</code> — Codelijsten (optioneel)
            </div>
        </div>
    </div>;
}

// ════════════════════════════════════════════════════
//  ADD ENTITY MODAL
// ════════════════════════════════════════════════════

function AddEntityModal({dcEntities,schema,onAdd,onClose}){
    const [search,setSearch]=useState('');
    const [parentPad,setParentPad]=useState('PP');

    const existingCodes=new Set(schema.filter(s=>s.isEntity).map(s=>s.label));
    const filtered=useMemo(()=>{
        if(!search)return dcEntities.slice(0,50);
        const t=search.toLowerCase();
        return dcEntities.filter(e=>e.entCode.toLowerCase().includes(t)||e.naam.toLowerCase().includes(t)).slice(0,50);
    },[dcEntities,search]);

    // Parent pad options from existing entities
    const padOptions=useMemo(()=>{
        const pads=new Set(['']);
        schema.filter(s=>s.isEntity).forEach(s=>pads.add(s.pad));
        return Array.from(pads).sort();
    },[schema]);

    return <div className="modal-overlay" onClick={onClose}>
        <div className="modal modal-md" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
                <strong>Entiteit toevoegen</strong>
                <button style={{fontSize:18,color:'var(--tx3)'}} onClick={onClose}>×</button>
            </div>
            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:8}}>
                <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek entiteit..." style={{flex:1}} autoFocus/>
                <select value={parentPad} onChange={e=>setParentPad(e.target.value)} style={{minWidth:120}}>
                    <option value="">Root</option>
                    {padOptions.filter(p=>p).map(p=><option key={p} value={p}>{p}</option>)}
                </select>
            </div>
            <div className="modal-body">
                {filtered.map(ent=>{
                    const exists=existingCodes.has(ent.entCode);
                    return <div key={ent.entCode} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:6,cursor:exists?'default':'pointer',opacity:exists?.5:1}}
                        onClick={()=>!exists&&onAdd(ent.entCode,parentPad)}
                        onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}}
                        onMouseLeave={e=>{e.currentTarget.style.background='transparent'}}>
                        <span className="badge badge-ent">{ent.entCode}</span>
                        <span style={{flex:1,fontSize:13}}>{ent.naam}</span>
                        {exists&&<span style={{fontSize:11,color:'var(--tx3)'}}>al toegevoegd</span>}
                    </div>;
                })}
                {filtered.length===0&&<p style={{color:'var(--tx3)',textAlign:'center',padding:20}}>Geen entiteiten gevonden</p>}
            </div>
        </div>
    </div>;
}

// ════════════════════════════════════════════════════
//  ADD ATTRIBUTE MODAL
// ════════════════════════════════════════════════════

function AddAttrModal({entity,dcByEntity,schema,onAdd,onClose}){
    const [search,setSearch]=useState('');
    const entCode=entity.label;
    const targetPad=entity.pad;

    const attrs=dcByEntity[entCode]||[];
    const existingLabels=new Set(schema.filter(s=>s.pad===targetPad&&!s.isEntity).map(s=>s.label));

    const filtered=useMemo(()=>{
        if(!search)return attrs;
        const t=search.toLowerCase();
        return attrs.filter(a=>a.attrCode.toLowerCase().includes(t)||a.naam.toLowerCase().includes(t));
    },[attrs,search]);

    return <div className="modal-overlay" onClick={onClose}>
        <div className="modal modal-md" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
                <div>
                    <strong>Attribuut toevoegen aan {entCode}</strong>
                    <div style={{fontSize:12,color:'var(--tx3)'}}>{entity.omschrijving} • {attrs.length} beschikbaar</div>
                </div>
                <button style={{fontSize:18,color:'var(--tx3)'}} onClick={onClose}>×</button>
            </div>
            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--bdr)'}}>
                <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek attribuut..." style={{width:'100%'}} autoFocus/>
            </div>
            <div className="modal-body">
                {filtered.map(attr=>{
                    const label=`${entCode}_${attr.attrCode}`;
                    const exists=existingLabels.has(label);
                    return <div key={attr.attrCode} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:6,cursor:exists?'default':'pointer',opacity:exists?.5:1}}
                        onClick={()=>{if(!exists){onAdd(entCode,attr.attrCode,targetPad);}}}
                        onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}}
                        onMouseLeave={e=>{e.currentTarget.style.background='transparent'}}>
                        <code style={{fontSize:11,minWidth:100}}>{label}</code>
                        <span style={{flex:1,fontSize:12}}>{attr.naam}</span>
                        {attr.codelijst&&<code style={{fontSize:10,color:'var(--tx3)'}}>{attr.codelijst}</code>}
                        {attr.datatype&&<span className="badge badge-card" style={{fontSize:10}}>{attr.datatype}</span>}
                        {exists&&<span style={{fontSize:10,color:'var(--ok)'}}>✓</span>}
                    </div>;
                })}
                {filtered.length===0&&<p style={{color:'var(--tx3)',textAlign:'center',padding:20}}>
                    {attrs.length===0?`Geen attributen gevonden voor ${entCode} in de datacatalogus`:'Geen resultaten'}
                </p>}
            </div>
        </div>
    </div>;
}

// ════════════════════════════════════════════════════
//  META MODAL
// ════════════════════════════════════════════════════

function MetaModal({meta,onSave,onClose}){
    const [m,setM]=useState({...meta});
    const set=(k,v)=>setM(prev=>({...prev,[k]:v}));
    const fields=[
        ['Branche','branche'],['POR maatschappij aanduiding','porCode'],
        ['AFD-definitie naam','afdNaam'],['AFD-definitie versienummer','afdVersie'],
        ['AFD-definitie tag','afdTag'],['Productsegment','segment'],
        ['Organisatie','organisatie'],['Commerciële productnaam','productnaam'],
        ['Contactpersoon','contactpersoon'],['E-mail / Telefoon','email'],['Datum','datum']
    ];
    return <div className="modal-overlay" onClick={onClose}>
        <div className="modal modal-sm" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><strong>Metagegevens</strong><button style={{fontSize:18,color:'var(--tx3)'}} onClick={onClose}>×</button></div>
            <div className="modal-body">
                {fields.map(([label,key])=><div className="field-group" key={key}>
                    <div className="field-label">{label}</div>
                    {key==='segment'?
                        <select value={m[key]||''} onChange={e=>set(key,e.target.value)} style={{width:'100%'}}>
                            <option value="">—</option><option value="Particulier">Particulier</option><option value="Zakelijk">Zakelijk</option>
                        </select>:
                        <input type="text" value={m[key]||''} onChange={e=>set(key,e.target.value)} style={{width:'100%'}}/>
                    }
                </div>)}
            </div>
            <div className="modal-footer">
                <button className="btn btn-secondary" onClick={onClose}>Annuleren</button>
                <button className="btn btn-primary" onClick={()=>onSave(m)}>Opslaan</button>
            </div>
        </div>
    </div>;
}

// ════════════════════════════════════════════════════
//  CODELIST MODAL
// ════════════════════════════════════════════════════

function CodelistModal({name,items,desc,onClose}){
    const [search,setSearch]=useState('');
    const filtered=useMemo(()=>{
        if(!search)return items;
        const t=search.toLowerCase();
        return items.filter(i=>String(i.code).toLowerCase().includes(t)||String(i.oms).toLowerCase().includes(t));
    },[items,search]);
    return <div className="modal-overlay" onClick={onClose}>
        <div className="modal modal-md" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
                <div><strong>Codelijst: {name}</strong>{desc&&<div style={{fontSize:12,color:'var(--tx3)'}}>{desc}</div>}</div>
                <button style={{fontSize:18,color:'var(--tx3)'}} onClick={onClose}>×</button>
            </div>
            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--bdr)'}}>
                <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek..." style={{width:'100%'}} autoFocus/>
            </div>
            <div className="modal-body">
                <div style={{fontSize:12,color:'var(--tx3)',marginBottom:8}}>{filtered.length} van {items.length} items</div>
                {filtered.slice(0,200).map((item,i)=><div key={i} style={{display:'flex',gap:8,padding:'4px 8px',borderRadius:4,fontSize:12}}>
                    <code style={{minWidth:60,fontWeight:600,color:'var(--acc)'}}>{item.code}</code>
                    <span style={{color:'var(--tx2)'}}>{item.oms}</span>
                </div>)}
            </div>
        </div>
    </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
