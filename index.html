<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFD Productdefinitie Builder</title>
<link rel="icon" type="image/png" href="favicon.png">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f5f7;--bg2:#fff;--bg3:#eef0f4;--bg4:#e2e5eb;--tx:#1a1d27;--tx2:#4a4f63;--tx3:#8890a4;
--bdr:#d8dce4;--acc:#1a6bff;--acc2:#0d4fcc;--accBg:#e8f0ff;--ent:#0052cc;--attr:#1a7f37;--deck:#7c3aed;
--ok:#16a34a;--warn:#b45309;--err:#dc2626;--sh:0 1px 2px rgba(0,0,0,.05);--sh2:0 6px 20px rgba(0,0,0,.1);
--polBg:#f3ecf8;--kaBg:#e8d5f5;--kaHdr:#7030a0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.4}
input,select,textarea{font-family:inherit;font-size:12px;padding:4px 8px;border:1px solid var(--bdr);border-radius:4px;background:var(--bg2);color:var(--tx);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(26,107,255,.15)}
input::placeholder,textarea::placeholder{color:var(--tx3)}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:12px}
button:disabled{opacity:.35;cursor:not-allowed}
code{font-family:'SF Mono',Consolas,monospace;font-size:11px;background:var(--bg3);padding:1px 4px;border-radius:3px}

/* Buttons */
.b{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:5px;font-weight:500;font-size:12px;transition:all .12s}
.bp{background:var(--acc);color:#fff}.bp:hover:not(:disabled){background:var(--acc2)}
.bs{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}.bs:hover:not(:disabled){background:var(--bg4)}
.bd{color:var(--err);padding:2px 6px}.bd:hover{background:#fee2e2;border-radius:3px}
.bg{color:var(--tx3);padding:2px 6px;border-radius:3px}.bg:hover{color:var(--tx);background:var(--bg3)}

/* Tags */
.tg{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.2px}
.te{background:#d6e4ff;color:var(--ent)}.ta{background:#d4edda;color:var(--attr)}.td{background:#ede9fe;color:var(--deck)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(2px)}
.md{background:var(--bg2);border-radius:10px;box-shadow:var(--sh2);width:100%;display:flex;flex-direction:column;overflow:hidden}

/* Schema table */
.st{width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}
.st th{position:sticky;top:0;z-index:2;background:var(--bg3);padding:4px 8px;font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--bdr);border-right:1px solid var(--bdr);white-space:nowrap;text-align:center}
.st th:last-child{border-right:none}
.st th.l{text-align:left}
.st th.pol{background:var(--polBg);color:#6b21a8}
.st th.ka{background:var(--kaHdr);color:#fff}
.st td{padding:3px 8px;border-bottom:1px solid #e8eaef;border-right:1px solid #edf0f4;font-size:11px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st td:last-child{border-right:none}
.st tr:hover td{background:#f6f8fb}
.st tr.sel td{background:var(--accBg)}
.st tr.ent td{background:#edf2fb;font-weight:600;border-bottom:1px solid var(--bdr)}
.st tr.ent.dk td{background:#f3eefa}
.st tr.sep td{padding:0;height:5px;border:none;background:var(--bg)}
/* Value columns */
.st td.vc{background:#f8f9fc;font-size:10px;color:var(--tx2)}.st tr:hover td.vc{background:#f0f3f8}.st tr.sel td.vc{background:#dde7fd}
.st tr.ent td.vc{background:transparent}
/* Func columns compact */
.st th.fc-h{padding:4px 2px;width:34px;min-width:34px;max-width:34px}
.st td.fc-c{padding:1px 0;text-align:center;width:34px;min-width:34px;max-width:34px}
.fx{width:28px;height:22px;text-align:center;font-size:10px;font-weight:700;border-radius:3px;cursor:pointer;user-select:none;border:none;background:transparent;padding:0}
.fx:hover{background:var(--bg4)}
.fx.fv{background:#dcfce7;color:#166534}.fx.fo{background:#fef9c3;color:#854d0e}.fx.fk{background:#d6e4ff;color:#1e40af}
/* Func in polisblad/KA columns */
td.pol{background:var(--polBg)}td.ka{background:var(--kaBg)}
tr.ent td.pol{background:#e8d5f5}tr.ent td.ka{background:#d4b8ed}

/* Sidebar */
.sb{width:320px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;font-size:12px}
.sf{margin-bottom:10px}.sl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}

/* Animations */
@keyframes fi{from{opacity:0}to{opacity:1}}.fi{animation:fi .1s ease-out}
@keyframes sp{to{transform:rotate(360deg)}}.sp{animation:sp .8s linear infinite}
.tt{position:fixed;bottom:16px;right:16px;z-index:200;padding:8px 16px;border-radius:6px;color:#fff;font-size:12px;font-weight:500;box-shadow:var(--sh2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;
const FN=['premieBerekening_aanroep','premieBerekening_resultaat','acceptatie_aanroep','acceptatie_resultaat','polisbladGegevens','kunnenAanleveren'];
const FS=['PB_A','PB_R','AC_A','AC_R','POL','KA'];
const CDS=['','0-1','1-1','0-9','1-9'];const VOS=['','V','O'];
let _u=0;const uid=()=>'_'+(++_u);

function parseDC(t){const ls=t.split(/\r?\n/).filter(l=>l.length>=64),r=[];for(const l of ls){const tp=l[0];if(tp!=='E'&&tp!=='A')continue;const ec=l.substring(1,3).trim(),nm=l.substring(28,64).trim(),om=l.substring(64).trim();if(tp==='E')r.push({type:'E',ec,ac:'',nm,om,dt:'',fm:'',cl:''});else{const ac=l.substring(5,12).trim(),pd=l.substring(12,14).trim(),fm=l.substring(14,19).trim(),sd=l.substring(19,21).trim(),cl=l.substring(21,28).trim();r.push({type:'A',ec,ac,nm,om,dt:sd||pd,fm:fm?pd+fm:pd,cl});}}return r;}
function parseCL(t){const ls=t.split(/\r?\n/).filter(l=>l.length>=8),g={},d={};for(const l of ls){const tp=l[0],nm=l.substring(1,7).trim();if(!nm)continue;if(tp==='L'){const r=l.substring(7).trim();d[nm]=r.length>1?r.slice(0,-1).trim():'';if(!g[nm])g[nm]=[];}else if(tp==='C'){if(!g[nm])g[nm]=[];const raw=l.substring(7);let c,o;if(raw.length>4&&raw[4]===' '){c=raw.substring(0,4).trim();o=raw.substring(5).trim();}else{const si=raw.indexOf(' ');if(si>0){c=raw.substring(0,si).trim();o=raw.substring(si+1).trim();}else{c=raw.trim();o='';}}if(c)g[nm].push({code:c,oms:o});}}return{g,d};}

function impTpl(buf){const wb=XLSX.read(buf,{type:'array',cellDates:true}),r={meta:{},schema:[]};
if(wb.SheetNames.includes('Metagegevens en Updates')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['Metagegevens en Updates'],{header:1,defval:''});for(const row of rows){const k=String(row[0]||'').replace(':','').trim(),v=row[1]||'';if(k==='Naam organisatie')r.meta.organisatie=v;if(k==='Commerciele productnaam')r.meta.productnaam=v;if(k==='Contactpersoon')r.meta.contactpersoon=v;if(k.includes('E-mail'))r.meta.email=v;if(k==='Datum')r.meta.datum=v;}}
if(wb.SheetNames.includes('Schema')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['Schema'],{header:1,defval:''});let hi=-1;for(let i=0;i<15&&i<rows.length;i++)if(rows[i]&&rows[i][0]==='Pad'){hi=i;break;}if(hi<0)return r;
for(let i=0;i<hi;i++){const k=String(rows[i][0]||'').replace(':','').trim(),v=rows[i][1]||'';if(k==='Branche')r.meta.branche=v;if(k==='POR maatschappij aanduiding')r.meta.porCode=v;if(k==='AFD-definitie naam')r.meta.afdNaam=v;if(k==='AFD-definitie versienummer')r.meta.afdVersie=v;if(k==='AFD-definitie tag')r.meta.afdTag=v;if(k.includes('Productsegment'))r.meta.segment=v;}
for(let i=hi+1;i<rows.length;i++){const row=rows[i],pad=String(row[0]||'').trim(),label=String(row[1]||'').trim();if(!pad||!label)continue;const pl=pad.split('/').pop(),isE=label===pl&&!label.includes('_');const fv={};FN.forEach((fn,j)=>{const v=String(row[10+j]||'').trim();if(v)fv[fn]=v;});r.schema.push({pad,label,oms:String(row[2]||'').trim(),cl:String(row[3]||'').trim(),acl:String(row[4]||'').trim(),scl:String(row[5]||'').trim(),ol:String(row[6]||'').trim(),mn:row[7]!=null&&row[7]!==''?String(row[7]):'',mx:row[8]!=null&&row[8]!==''?String(row[8]):'',eo:String(row[9]||'').trim(),fn:fv,isE});}}return r;}

function expTpl(meta,schema){
    const wb=new ExcelJS.Workbook();wb.creator='AFD Productdefinitie Builder';
    const wm=wb.addWorksheet('Metagegevens en Updates');
    wm.getColumn(1).width=29;wm.getColumn(2).width=15;wm.getColumn(3).width=76;
    const tf={name:'Calibri',size:14,bold:true},lf={name:'Calibri',size:12},sf={name:'Calibri',size:10,bold:true},df={name:'Calibri',size:10},dbf={name:'Calibri',size:10,bold:true};
    wm.getRow(2).getCell(2).value='Metagegevens AFD-definitie en Updates Excel-template en product';wm.getRow(2).getCell(2).font=tf;wm.getRow(2).height=17.4;
    wm.mergeCells('A3:C3');wm.getCell('A3').value='Metagegevens AFD-definitie';wm.getCell('A3').font=sf;
    [['Naam organisatie:',meta.organisatie],['Commerciele productnaam:',meta.productnaam],['Bronnen:',''],['Contactpersoon:',meta.contactpersoon],['E-mail / Telefoon:',meta.email],['Datum:',meta.datum]].forEach(([k,v],i)=>{const r=wm.getRow(5+i);r.getCell(1).value=k;r.getCell(1).font=lf;if(v){r.getCell(2).value=v;r.getCell(2).font=lf;}});
    wm.mergeCells('A12:C12');wm.getCell('A12').value='Updates product (voor eigen gebruik)';wm.getCell('A12').font=sf;
    const uh=wm.getRow(14);['Versie','Datum','Omschrijving aanpassing'].forEach((h,i)=>{uh.getCell(i+1).value=h;uh.getCell(i+1).font=sf;});
    wm.mergeCells('A27:C27');wm.getCell('A27').value='Updates Excel-template (beheer door SIVI)';wm.getCell('A27').font=sf;
    const uh2=wm.getRow(29);['Versie','Datum','Omschrijving aanpassing'].forEach((h,i)=>{uh2.getCell(i+1).value=h;uh2.getCell(i+1).font=sf;});
    const ws=wb.addWorksheet('Schema');
    [19.66,17.33,44.33,10.33,5.66,15.66,10,10.66,10,30.66,9.66,9.66,9.66,9.66,9.66,9.66].forEach((w,i)=>{ws.getColumn(i+1).width=w;});
    const ca={horizontal:'center',vertical:'middle',wrapText:true};
    const fO={type:'pattern',pattern:'solid',fgColor:{argb:'FFE1CCF0'}};
    const fP={type:'pattern',pattern:'solid',fgColor:{argb:'FFB889DB'}};
    const fPH={type:'pattern',pattern:'solid',fgColor:{argb:'FF7030A0'}};
    ws.mergeCells('A1:C1');ws.getCell('A1').value='Eigenschappen AFD-definitie';ws.getCell('A1').font={name:'Calibri',size:12,bold:true};ws.getRow(1).height=15.6;
    [['Branche:',meta.branche],['POR maatschappij aanduiding:',meta.porCode],['AFD-definitie naam:',meta.afdNaam],['AFD-definitie versienummer:',meta.afdVersie],['AFD-definitie tag:',meta.afdTag],['Productsegment Particulier/Zakelijk:',meta.segment]].forEach(([k,v],i)=>{const r=ws.getRow(3+i);r.getCell(1).value=k;r.getCell(1).font=lf;if(v){r.getCell(2).value=v;r.getCell(2).font=lf;}});
    const hdr=ws.getRow(10);hdr.height=141.75;
    ['Pad','Label','Omschrijving','Codelijst','Actuele codelijst','Subset codelijst','Optielijst','Minimum','Maximum','Eigen omschrijving',...FN].forEach((h,i)=>{const c=hdr.getCell(i+1);c.value=h;c.font={name:'Calibri',size:10,bold:true};c.alignment=ca;if(i===14)c.fill=fO;if(i===15)c.fill=fPH;});
    ws.views=[{state:'frozen',xSplit:0,ySplit:10,topLeftCell:'A11'}];
    let rn=11,pp=null;
    for(const s of schema){if(s.isE&&pp!==null&&s.pad!==pp){const sr=ws.getRow(rn);sr.height=11.4;sr.getCell(15).fill=fO;sr.getCell(16).fill=fP;rn++;}if(s.isE)pp=s.pad;
    const row=ws.getRow(rn);[s.pad,s.label,s.oms,s.cl,s.acl||'',s.scl||'',s.ol||'',s.mn||'',s.mx||'',s.eo||'',...FN.map(f=>s.fn[f]||'')].forEach((v,i)=>{const c=row.getCell(i+1);c.value=v||null;c.font=s.isE&&i===2?dbf:df;if(i>=10)c.alignment={horizontal:'center'};if(i===14)c.fill=fO;if(i===15)c.fill=fP;});rn++;}
    const wv=wb.addWorksheet(' Verbandscontrole');
    wv.getColumn(1).width=65;wv.getColumn(2).width=40;wv.getColumn(3).width=32;wv.getColumn(5).width=34;wv.getColumn(6).width=23;wv.getColumn(7).width=50;
    const rf={type:'pattern',pattern:'solid',fgColor:{argb:'FFFF0000'}},gf={name:'Calibri',size:10,color:{argb:'FF808080'}};
    for(let b=0;b<3;b++){const br=7+b*4;const h=wv.getRow(br);['Beschrijving verbandscontrole','Naam','Bron','Conditie',null,'Else','Foutmelding'].forEach((x,i)=>{if(x){h.getCell(i+1).value=x;h.getCell(i+1).font={name:'Calibri',size:10,bold:true};h.getCell(i+1).fill=rf;}});wv.mergeCells(br,4,br,5);
    const ir=wv.getRow(br+1);ir.height=26.4;ir.getCell(1).value='<Conditie>';ir.getCell(1).font=gf;ir.getCell(4).value='If';ir.getCell(4).font=df;ir.getCell(5).value='<Pseudocode>';ir.getCell(5).font=gf;
    const tr=wv.getRow(br+2);tr.height=26.4;tr.getCell(1).value='<Validatie>';tr.getCell(1).font=gf;tr.getCell(4).value='Then';tr.getCell(4).font=df;tr.getCell(5).value='<Pseudocode>';tr.getCell(5).font=gf;}
    const wf=wb.addWorksheet('Functielijst');wf.getColumn(1).width=25;wf.getCell('A1').value='Kolom1';wf.getCell('A1').font=df;wf.getCell('A2').value='Functielijst';wf.getCell('A2').font=df;FN.forEach((f,i)=>{wf.getCell(`A${3+i}`).value=f;wf.getCell(`A${3+i}`).font=df;});
    return wb;
}

// ══════════ SUBSET PICKER ══════════
function SubsetPicker({codes,value,onChange}){
    const [q,setQ]=useState('');const [open,setOpen]=useState(false);
    const sel=useMemo(()=>new Set((value||'').split(';').map(s=>s.trim()).filter(Boolean)),[value]);
    const fl=useMemo(()=>{if(!q)return codes;const t=q.toLowerCase();return codes.filter(c=>String(c.code).toLowerCase().includes(t)||String(c.oms).toLowerCase().includes(t));},[codes,q]);
    const tog=useCallback(code=>{const s=new Set(sel);if(s.has(code))s.delete(code);else s.add(code);onChange(Array.from(s).join(';'));},[sel,onChange]);
    return <div className="sf">
        <div className="sl" style={{display:'flex',justifyContent:'space-between'}}><span>Subset codelijst</span>
            <button className="bg" style={{fontSize:10,textTransform:'none',letterSpacing:0}} onClick={()=>setOpen(!open)}>{open?'▲ Sluiten':'▼ Selecteren'}</button></div>
        {sel.size>0&&<div style={{display:'flex',flexWrap:'wrap',gap:2,marginBottom:4}}>
            {Array.from(sel).map(c=><span key={c} style={{display:'inline-flex',alignItems:'center',gap:2,padding:'0 5px',borderRadius:3,fontSize:10,background:'#d6e4ff',color:'#1e40af',cursor:'pointer',lineHeight:'18px'}} onClick={()=>tog(c)}>{c} <span style={{fontSize:8}}>✕</span></span>)}</div>}
        {sel.size>0&&!open&&<div style={{fontSize:10,color:'var(--tx3)'}}>{sel.size}/{codes.length} geselecteerd</div>}
        {open&&<div style={{border:'1px solid var(--bdr)',borderRadius:4,overflow:'hidden',marginTop:2}}>
            <div style={{padding:3,borderBottom:'1px solid var(--bdr)',background:'var(--bg3)'}}><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek..." style={{width:'100%',fontSize:11,padding:'3px 6px'}}/></div>
            <div style={{display:'flex',gap:4,padding:'3px 6px',borderBottom:'1px solid var(--bdr)'}}><button className="bg" style={{fontSize:9}} onClick={()=>onChange(fl.map(c=>c.code).join(';'))}>Alles</button><button className="bg" style={{fontSize:9}} onClick={()=>onChange('')}>Geen</button><span style={{flex:1}}/><span style={{fontSize:9,color:'var(--tx3)',alignSelf:'center'}}>{sel.size}/{codes.length}</span></div>
            <div style={{maxHeight:180,overflow:'auto'}}>{fl.map(c=>{const s=sel.has(c.code);return <div key={c.code} style={{display:'flex',alignItems:'center',gap:5,padding:'2px 6px',cursor:'pointer',background:s?'var(--accBg)':'',fontSize:11}} onClick={()=>tog(c.code)}>
                <span style={{width:14,height:14,borderRadius:3,border:'1.5px solid '+(s?'var(--acc)':'var(--bdr)'),background:s?'var(--acc)':'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{s&&<span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}</span>
                <code style={{fontSize:10,minWidth:35,color:'var(--acc)'}}>{c.code}</code><span style={{color:'var(--tx2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.oms}</span></div>;})}
            </div></div>}
    </div>;
}

// ══════════ APP ══════════
function App(){
const [dc,setDc]=useState([]);const [cg,setCg]=useState({});const [cd,setCd]=useState({});const [hier,setHier]=useState({});const [ld,setLd]=useState(true);const [de,setDe]=useState(null);
const [meta,setMeta]=useState({branche:'',porCode:'',afdNaam:'',afdVersie:'',afdTag:'',segment:'Zakelijk',organisatie:'',productnaam:'',contactpersoon:'',email:'',datum:''});
const [schema,setSchema]=useState([]);const [sel,setSel]=useState(null);const [vw,setVw]=useState('start');const [tt,setTt]=useState(null);const [exp,setExp]=useState(new Set());const [ml,setMl]=useState(null);

useEffect(()=>{(async()=>{try{const r=await fetch('Datacat.afm');if(!r.ok)throw new Error('Datacat.afm niet gevonden');setDc(parseDC(await r.text()));try{const r2=await fetch('Codelist.afm');if(r2.ok){const{g,d}=parseCL(await r2.text());setCg(g);setCd(d);}}catch(e){}try{const r3=await fetch('Hierarchie.json');if(r3.ok)setHier(await r3.json());}catch(e){console.warn('Hierarchie.json niet geladen');}setLd(false);}catch(e){setDe(e.message);setLd(false);}})();},[]);

const msg=useCallback((m,t='ok')=>{setTt({m,t});setTimeout(()=>setTt(null),2500);},[]);
const dcE=useMemo(()=>dc.filter(d=>d.type==='E'),[dc]);
const dcA=useMemo(()=>{const m={};dc.forEach(d=>{if(d.type==='A'){if(!m[d.ec])m[d.ec]=[];m[d.ec].push(d);}});return m;},[dc]);
const dcM=useMemo(()=>{const m={};dcE.forEach(e=>{m[e.ec]=e;});return m;},[dcE]);

// Build tree: [{...entity, at:[...attrs]}, ...]
const tree=useMemo(()=>{const r=[];let c=null;for(const s of schema){if(s.isE){c={...s,at:[]};r.push(c);}else if(c)c.at.push(s);}return r;},[schema]);
const si=useMemo(()=>schema.find(s=>s._id===sel),[schema,sel]);

// Build flat display list with separators
const displayRows=useMemo(()=>{
    const rows=[];let prevPad=null;
    for(const ent of tree){
        if(prevPad!==null&&ent.pad!==prevPad)rows.push({_type:'sep'});
        rows.push({...ent,_type:'ent'});
        if(exp.has(ent.pad+'|'+ent.label)){
            for(const a of ent.at)rows.push({...a,_type:'attr'});
        }
        prevPad=ent.pad;
    }
    return rows;
},[tree,exp]);

const upd=useCallback((id,u)=>setSchema(p=>p.map(s=>s._id===id?{...s,...u}:s)),[]);

{si.cl&&cg[si.cl]?<SubsetPicker codes={cg[si.cl]} value={si.scl||''} onChange={v=>upd(sel,{scl:v})}/>:null}
<div className="sf"><div className="sl">Optielijst</div><input type="text" value={si.ol||''} onChange={e=>upd(sel,{ol:e.target.value})} style={{width:'100%'}} placeholder="bijv. 250;500;1000"/></div>
<div className="sf"><div className="sl">Min / Max</div><div style={{display:'flex',gap:4}}><input type="text" value={si.mn||''} onChange={e=>upd(sel,{mn:e.target.value})} placeholder="Min" style={{flex:1}}/><input type="text" value={si.mx||''} onChange={e=>upd(sel,{mx:e.target.value})} placeholder="Max" style={{flex:1}}/></div></div>
<div className="sf"><div className="sl">Eigen omschrijving</div><textarea value={si.eo||''} onChange={e=>upd(sel,{eo:e.target.value})} style={{width:'100%',minHeight:40,resize:'vertical',border:'1px solid var(--bdr)',borderRadius:4,padding:'4px 8px',fontSize:12,fontFamily:'inherit'}} placeholder="Eigen omschrijving..."/></div>
<div className="sf"><div className="sl">Functies</div><div style={{display:'grid',gridTemplateColumns:'36px 1fr',gap:'2px 6px',alignItems:'center'}}>{FN.map((fn,i)=>{const v=si.fn[fn]||'';return <React.Fragment key={fn}><span style={{fontSize:10,color:'var(--tx3)',fontWeight:700}}>{FS[i]}</span><select value={v} onChange={e=>upd(sel,{fn:{...si.fn,[fn]:e.target.value}})} style={{fontSize:11,padding:'2px 6px'}}>{(si.isE?CDS:VOS).map(o=><option key={o} value={o}>{o||'—'}</option>)}</select></React.Fragment>;})}</div></div>
<div className="sf" style={{paddingTop:8,borderTop:'1px solid var(--bdr)',marginTop:4}}><button className="b bd" style={{width:'100%',justifyContent:'center',background:'#fee2e2',borderRadius:5,padding:'4px 10px'}} onClick={()=>{if(confirm(`${si.label} verwijderen?${si.isE?' + alle attributen':''}`))del(sel);}}>🗑 Verwijderen</button></div>
</div>}
</div></div>

{/* MODALS */}
{ml?.t==='addE'&&<AEM dc={dcE} dcM={dcM} hier={hier} schema={schema} onAdd={addE} onClose={()=>setMl(null)}/>}
{ml?.t==='addA'&&<AAM ec={ml.ec} pad={ml.pad} eo={ml.eo} dcA={dcA} schema={schema} onAdd={addA} onClose={()=>setMl(null)}/>}
{ml?.t==='meta'&&<MM meta={meta} onSave={m=>{setMeta(m);setMl(null);msg('Opgeslagen');}} onClose={()=>setMl(null)}/>}
{ml?.t==='cl'&&<CM n={ml.n} items={cg[ml.n]||[]} desc={cd[ml.n]||''} onClose={()=>setMl(null)}/>}
{tt&&<div className="tt fi" style={{background:tt.t==='ok'?'var(--ok)':tt.t==='warn'?'var(--warn)':'var(--err)'}}>{tt.m}</div>}
</div>;}

// ══════════ MODALS ══════════
function AEM({dc,dcM,hier,schema,onAdd,onClose}){const [q,setQ]=useState('');const [parentPath,setParentPath]=useState('');
// Get existing entities by pad
const existing=new Set(schema.filter(s=>s.isE).map(s=>s.pad+'|'+s.label));
// Build parent options from current schema entities
const parentOpts=useMemo(()=>{
    const opts=[{v:'',l:'Root (top-level)',code:'ROOT'}];
    schema.filter(s=>s.isE).forEach(s=>{
        // Each entity can be a parent
        const fullPad=s.pad;
        if(!opts.some(o=>o.v===fullPad))
            opts.push({v:fullPad,l:fullPad+' — '+s.oms,code:s.label});
    });
    return opts;
},[schema]);
// Determine which entities can be added under the selected parent
const validChildren=useMemo(()=>{
    if(!hier||Object.keys(hier).length===0){
        // Fallback: show all entities from datacatalogus
        return dc.map(e=>({code:e.ec,naam:e.nm}));
    }
    // Find the parent entity code
    const parentOpt=parentOpts.find(o=>o.v===parentPath);
    const parentCode=parentOpt?parentOpt.code:'ROOT';
    // Get valid children from hierarchy
    const children=hier[parentCode]||[];
    // Enrich with DC data (naam)
    return children.map(ch=>{
        const dcEnt=dcM[ch.c];
        return {code:ch.c,naam:dcEnt?dcEnt.nm:ch.n};
    });
},[hier,parentPath,parentOpts,dc,dcM]);
// Filter by search
const fl=useMemo(()=>{
    const t=q.toLowerCase();
    return q?validChildren.filter(e=>e.code.toLowerCase().includes(t)||e.naam.toLowerCase().includes(t)):validChildren;
},[validChildren,q]);

return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:700,maxHeight:'85vh'}}>
<div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:10,alignItems:'center'}}><strong style={{flex:1,fontSize:13}}>Entiteit toevoegen (volgens hiërarchie)</strong><button className="bg" onClick={onClose}>✕</button></div>
<div style={{padding:'6px 16px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:6}}>
<input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek entiteit..." style={{flex:1}} autoFocus/>
<select value={parentPath} onChange={e=>setParentPath(e.target.value)} style={{minWidth:180,fontSize:11}}>
{parentOpts.map(p=><option key={p.v} value={p.v}>{p.l}</option>)}
</select></div>
<div style={{padding:'2px 16px',borderBottom:'1px solid var(--bdr)',fontSize:10,color:'var(--tx3)'}}>
{validChildren.length} geldige {validChildren.length===1?'entiteit':'entiteiten'} voor {parentPath||'root'}
</div>
<div style={{flex:1,overflow:'auto',padding:'4px 8px',maxHeight:'60vh'}}>
{fl.map(e=>{const targetPad=parentPath?parentPath+'/'+e.code:e.code;const exists=existing.has(targetPad+'|'+e.code);
return <div key={e.code} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px',borderRadius:4,cursor:exists?'default':'pointer',opacity:exists?.3:1,fontSize:12}}
onClick={()=>{if(!exists)onAdd(e.code,parentPath);}} onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}} onMouseLeave={e=>{e.currentTarget.style.background=''}}>
<span className="tg te">{e.code}</span><span style={{flex:1}}>{e.naam}</span>
<code style={{fontSize:10,color:'var(--tx3)'}}>{targetPad}</code>
{exists&&<span style={{fontSize:10,color:'var(--ok)'}}>✓</span>}</div>;})}
{fl.length===0&&<div style={{textAlign:'center',color:'var(--tx3)',padding:20,fontSize:12}}>
{q?'Geen resultaten':'Geen geldige sub-entiteiten voor deze parent'}
</div>}
</div></div></div>;}

function AAM({ec,pad,eo,dcA,schema,onAdd,onClose}){const [q,setQ]=useState('');
const attrs=dcA[ec]||[];const exL=useMemo(()=>new Set(schema.filter(s=>s.pad===pad&&!s.isE).map(s=>s.label)),[schema,pad]);
const [added,setAdded]=useState(new Set());
const fl=useMemo(()=>{const t=q.toLowerCase();return q?attrs.filter(a=>a.ac.toLowerCase().includes(t)||a.nm.toLowerCase().includes(t)):attrs;},[attrs,q]);
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:700,maxHeight:'85vh'}}>
<div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)'}}>
<div style={{display:'flex',justifyContent:'space-between'}}><div><strong style={{fontSize:13}}>Attributen — {ec}</strong><div style={{fontSize:11,color:'var(--tx3)'}}>{eo} • {attrs.length} beschikbaar</div></div><button className="bg" onClick={onClose}>✕</button></div></div>
<div style={{padding:'6px 16px',borderBottom:'1px solid var(--bdr)'}}><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek attribuut..." style={{width:'100%'}} autoFocus/></div>
<div style={{flex:1,overflow:'auto',padding:'4px 8px',maxHeight:'65vh'}}>
{fl.map(a=>{const lb=`${ec}_${a.ac}`;const exists=exL.has(lb)||added.has(lb);return <div key={a.ac} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 8px',borderRadius:4,cursor:exists?'default':'pointer',opacity:exists?.3:1,fontSize:12}}
onClick={()=>{if(!exists){onAdd(ec,a.ac,pad);setAdded(p=>{const n=new Set(p);n.add(lb);return n;});}}}
onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}} onMouseLeave={e=>{e.currentTarget.style.background=''}}>
<code style={{fontSize:10,minWidth:90,color:'var(--attr)'}}>{lb}</code><span style={{flex:1}}>{a.nm}</span>
{a.cl&&<code style={{fontSize:9,color:'var(--tx3)'}}>{a.cl}</code>}
{exists?<span style={{fontSize:10,color:'var(--ok)',fontWeight:600}}>✓</span>:<span style={{fontSize:10,color:'var(--acc)'}}>+</span>}
</div>;})}
{fl.length===0&&<div style={{textAlign:'center',color:'var(--tx3)',padding:20,fontSize:12}}>{attrs.length===0?`Geen attributen voor ${ec}`:'Geen resultaten'}</div>}
</div></div></div>;}

function MM({meta,onSave,onClose}){const [m,setM]=useState({...meta});
const fds=[['Branche','branche'],['POR code','porCode'],['AFD-definitie naam','afdNaam'],['Versienummer','afdVersie'],['Tag','afdTag'],['Segment','segment'],['Organisatie','organisatie'],['Productnaam','productnaam'],['Contactpersoon','contactpersoon'],['E-mail/Tel','email'],['Datum','datum']];
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:440,maxHeight:'70vh'}}>
<div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)',display:'flex',justifyContent:'space-between'}}><strong style={{fontSize:13}}>Metagegevens</strong><button className="bg" onClick={onClose}>✕</button></div>
<div style={{flex:1,overflow:'auto',padding:'12px 16px'}}>{fds.map(([l,k])=><div className="sf" key={k}><div className="sl">{l}</div>
{k==='segment'?<select value={m[k]||''} onChange={e=>setM(p=>({...p,[k]:e.target.value}))} style={{width:'100%'}}><option value="">—</option><option value="Particulier">Particulier</option><option value="Zakelijk">Zakelijk</option></select>:<input type="text" value={m[k]||''} onChange={e=>setM(p=>({...p,[k]:e.target.value}))} style={{width:'100%'}}/>}</div>)}</div>
<div style={{padding:'10px 16px',borderTop:'1px solid var(--bdr)',display:'flex',justifyContent:'flex-end',gap:6}}><button className="b bs" onClick={onClose}>Annuleren</button><button className="b bp" onClick={()=>onSave(m)}>Opslaan</button></div>
</div></div>;}

function CM({n,items,desc,onClose}){const [q,setQ]=useState('');
const f=useMemo(()=>{if(!q)return items;const t=q.toLowerCase();return items.filter(i=>String(i.code).toLowerCase().includes(t)||String(i.oms).toLowerCase().includes(t));},[items,q]);
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:550,maxHeight:'85vh'}}>
<div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)',display:'flex',justifyContent:'space-between'}}><div><strong style={{fontSize:13}}>{n}</strong>{desc&&<div style={{fontSize:11,color:'var(--tx3)'}}>{desc}</div>}</div><button className="bg" onClick={onClose}>✕</button></div>
<div style={{padding:'6px 16px',borderBottom:'1px solid var(--bdr)'}}><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek..." style={{width:'100%'}} autoFocus/></div>
<div style={{flex:1,overflow:'auto',padding:'4px 8px',maxHeight:'65vh'}}><div style={{fontSize:10,color:'var(--tx3)',marginBottom:4,padding:'0 8px'}}>{f.length}/{items.length}</div>
{f.slice(0,300).map((it,i)=><div key={i} style={{display:'flex',gap:6,padding:'2px 8px',fontSize:11}}><code style={{minWidth:40,fontWeight:600,color:'var(--acc)'}}>{it.code}</code><span style={{color:'var(--tx2)'}}>{it.oms}</span></div>)}
</div></div></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
