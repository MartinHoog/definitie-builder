<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFD Productdefinitie Builder</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f5f6f8;--bg2:#fff;--bg3:#f0f1f4;--bg4:#e8eaef;--tx:#1a1d27;--tx2:#4a4f63;--tx3:#8890a4;--bdr:#dfe1e8;--acc:#1a6bff;--acc2:#0d4fcc;--accBg:#eef4ff;--ent:#0066cc;--attr:#16803c;--deck:#8b5cf6;--ok:#16a34a;--warn:#d97706;--err:#dc2626;--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.08)}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
        input,select,textarea{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg2);color:var(--tx);outline:none;transition:border-color .15s}
        input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,107,255,.12)}
        input::placeholder,textarea::placeholder{color:var(--tx3)}
        button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:13px}
        button:disabled{opacity:.4;cursor:not-allowed}
        code{font-family:'Cascadia Code',Consolas,monospace;font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;font-weight:500;transition:all .15s}
        .btn-p{background:var(--acc);color:#fff}.btn-p:hover:not(:disabled){background:var(--acc2)}
        .btn-s{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}.btn-s:hover:not(:disabled){background:var(--bg4)}
        .btn-d{background:#fee2e2;color:var(--err)}.btn-d:hover:not(:disabled){background:#fecaca}
        .btn-g{color:var(--tx3);padding:4px 8px;border-radius:4px}.btn-g:hover{color:var(--tx);background:var(--bg3)}
        .btn-sm{padding:4px 10px;font-size:12px}
        .bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
        .bg-e{background:#dbeafe;color:var(--ent)}.bg-a{background:#dcfce7;color:var(--attr)}.bg-d{background:#ede9fe;color:var(--deck)}
        .mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
        .md{background:var(--bg2);border-radius:12px;box-shadow:var(--sh2);width:100%;display:flex;flex-direction:column;overflow:hidden}
        .eb{border:1px solid var(--bdr);border-radius:8px;margin-bottom:5px;background:var(--bg2);border-left:3px solid var(--ent)}
        .eb.dk{border-left-color:var(--deck)}
        .eh{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;user-select:none}.eh:hover{background:var(--bg3)}
        .ec{padding:0 0 4px 16px}
        .ar{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px}.ar:hover{background:var(--bg3)}.ar.sl{background:var(--accBg)}
        .fc{display:grid;grid-template-columns:repeat(6,28px);gap:1px;font-size:10px}
        .fc>div{text-align:center;padding:2px 0;border-radius:3px;cursor:pointer;user-select:none;font-weight:600}.fc>div:hover{background:var(--bg4)}
        .fv{background:#dcfce7;color:#166534}.fo{background:#fef9c3;color:#854d0e}.fk{background:#dbeafe;color:#1e40af;font-size:9px}
        .sb{width:340px;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
        .fg{margin-bottom:12px}.fl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
        @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}.fi{animation:fi .12s ease-out}
        @keyframes sp{to{transform:rotate(360deg)}}.sp{animation:sp .8s linear infinite}
        .tt{position:fixed;bottom:20px;right:20px;z-index:200;padding:10px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;box-shadow:var(--sh2)}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;
const FN=['premieBerekening_aanroep','premieBerekening_resultaat','acceptatie_aanroep','acceptatie_resultaat','polisbladGegevens','kunnenAanleveren'];
const FS=['PB_A','PB_R','AC_A','AC_R','POL','KA'];
const CDS=['','0-1','1-1','0-9','1-9'];
const VOS=['','V','O'];
let _u=0;const uid=()=>'_'+(++_u);

function parseDC(t){const ls=t.split(/\r?\n/).filter(l=>l.length>=64),r=[];for(const l of ls){const tp=l[0];if(tp!=='E'&&tp!=='A')continue;const ec=l.substring(1,3).trim(),nm=l.substring(28,64).trim(),om=l.substring(64).trim();if(tp==='E')r.push({type:'E',ec,ac:'',nm,om,dt:'',fm:'',cl:''});else{const ac=l.substring(5,12).trim(),pd=l.substring(12,14).trim(),fm=l.substring(14,19).trim(),sd=l.substring(19,21).trim(),cl=l.substring(21,28).trim();r.push({type:'A',ec,ac,nm,om,dt:sd||pd,fm:fm?pd+fm:pd,cl});}}return r;}
function parseCL(t){const ls=t.split(/\r?\n/).filter(l=>l.length>=8),g={},d={};for(const l of ls){const tp=l[0],nm=l.substring(1,7).trim();if(!nm)continue;if(tp==='L'){const r=l.substring(7).trim();d[nm]=r.length>1?r.slice(0,-1).trim():'';if(!g[nm])g[nm]=[];}else if(tp==='C'){if(!g[nm])g[nm]=[];const raw=l.substring(7);let c,o;if(raw.length>4&&raw[4]===' '){c=raw.substring(0,4).trim();o=raw.substring(5).trim();}else{const si=raw.indexOf(' ');if(si>0){c=raw.substring(0,si).trim();o=raw.substring(si+1).trim();}else{c=raw.trim();o='';}}if(c)g[nm].push({code:c,oms:o});}}return{g,d};}

function impTpl(buf){const wb=XLSX.read(buf,{type:'array',cellDates:true}),r={meta:{},schema:[]};
if(wb.SheetNames.includes('Metagegevens en Updates')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['Metagegevens en Updates'],{header:1,defval:''});for(const row of rows){const k=String(row[0]||'').replace(':','').trim(),v=row[1]||'';if(k==='Naam organisatie')r.meta.organisatie=v;if(k==='Commerciele productnaam')r.meta.productnaam=v;if(k==='Contactpersoon')r.meta.contactpersoon=v;if(k.includes('E-mail'))r.meta.email=v;if(k==='Datum')r.meta.datum=v;}}
if(wb.SheetNames.includes('Schema')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['Schema'],{header:1,defval:''});let hi=-1;for(let i=0;i<15&&i<rows.length;i++)if(rows[i]&&rows[i][0]==='Pad'){hi=i;break;}if(hi<0)return r;
for(let i=0;i<hi;i++){const k=String(rows[i][0]||'').replace(':','').trim(),v=rows[i][1]||'';if(k==='Branche')r.meta.branche=v;if(k==='POR maatschappij aanduiding')r.meta.porCode=v;if(k==='AFD-definitie naam')r.meta.afdNaam=v;if(k==='AFD-definitie versienummer')r.meta.afdVersie=v;if(k==='AFD-definitie tag')r.meta.afdTag=v;if(k.includes('Productsegment'))r.meta.segment=v;}
for(let i=hi+1;i<rows.length;i++){const row=rows[i],pad=String(row[0]||'').trim(),label=String(row[1]||'').trim();if(!pad||!label)continue;const pl=pad.split('/').pop(),isE=label===pl&&!label.includes('_');const fv={};FN.forEach((fn,j)=>{const v=String(row[10+j]||'').trim();if(v)fv[fn]=v;});r.schema.push({pad,label,oms:String(row[2]||'').trim(),cl:String(row[3]||'').trim(),acl:String(row[4]||'').trim(),scl:String(row[5]||'').trim(),ol:String(row[6]||'').trim(),mn:row[7]!=null&&row[7]!==''?String(row[7]):'',mx:row[8]!=null&&row[8]!==''?String(row[8]):'',eo:String(row[9]||'').trim(),fn:fv,isE});}}return r;}

function expTpl(meta,schema){const wb=XLSX.utils.book_new();
const mr=[[null,'Metagegevens AFD-definitie'],[],['Naam organisatie:',meta.organisatie||''],['Commerciele productnaam:',meta.productnaam||''],['Bronnen:',''],['Contactpersoon:',meta.contactpersoon||''],['E-mail / Telefoon:',meta.email||''],['Datum:',meta.datum||'']];const wm=XLSX.utils.aoa_to_sheet(mr);wm['!cols']=[{wch:28},{wch:40}];XLSX.utils.book_append_sheet(wb,wm,'Metagegevens en Updates');
const sr=[['Eigenschappen AFD-definitie'],[],['Branche:',meta.branche||''],['POR maatschappij aanduiding:',meta.porCode||''],['AFD-definitie naam:',meta.afdNaam||''],['AFD-definitie versienummer:',meta.afdVersie||''],['AFD-definitie tag:',meta.afdTag||''],['Productsegment Particulier/Zakelijk:',meta.segment||''],[],['Pad','Label','Omschrijving','Codelijst','Actuele codelijst','Subset codelijst','Optielijst','Minimum','Maximum','Eigen omschrijving',...FN]];
for(const s of schema)sr.push([s.pad,s.label,s.oms,s.cl,s.acl||'',s.scl||'',s.ol||'',s.mn||'',s.mx||'',s.eo||'',...FN.map(f=>s.fn[f]||'')]);
const ws=XLSX.utils.aoa_to_sheet(sr);ws['!cols']=[{wch:16},{wch:16},{wch:42},{wch:12},{wch:14},{wch:16},{wch:14},{wch:10},{wch:10},{wch:24},...FN.map(()=>({wch:10}))];XLSX.utils.book_append_sheet(wb,ws,'Schema');
XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Functielijst'],...FN.map(f=>[f])]),'Functielijst');return wb;}

function App(){
const [dc,setDc]=useState([]);const [cg,setCg]=useState({});const [cd,setCd]=useState({});const [ld,setLd]=useState(true);const [de,setDe]=useState(null);
const [meta,setMeta]=useState({branche:'',porCode:'',afdNaam:'',afdVersie:'',afdTag:'',segment:'Zakelijk',organisatie:'',productnaam:'',contactpersoon:'',email:'',datum:''});
const [schema,setSchema]=useState([]);const [sel,setSel]=useState(null);const [vw,setVw]=useState('start');const [tt,setTt]=useState(null);const [exp,setExp]=useState(new Set());const [ml,setMl]=useState(null);

useEffect(()=>{(async()=>{try{const r=await fetch('Datacat.afm');if(!r.ok)throw new Error('Datacat.afm niet gevonden');setDc(parseDC(await r.text()));try{const r2=await fetch('Codelist.afm');if(r2.ok){const{g,d}=parseCL(await r2.text());setCg(g);setCd(d);}}catch(e){}setLd(false);}catch(e){setDe(e.message);setLd(false);}})();},[]);

const msg=useCallback((m,t='ok')=>{setTt({m,t});setTimeout(()=>setTt(null),2500);},[]);
const dcE=useMemo(()=>dc.filter(d=>d.type==='E'),[dc]);
const dcA=useMemo(()=>{const m={};dc.forEach(d=>{if(d.type==='A'){if(!m[d.ec])m[d.ec]=[];m[d.ec].push(d);}});return m;},[dc]);
const dcM=useMemo(()=>{const m={};dcE.forEach(e=>{m[e.ec]=e;});return m;},[dcE]);

const tree=useMemo(()=>{const r=[];let c=null;for(const s of schema){if(s.isE){c={...s,at:[]};r.push(c);}else if(c)c.at.push(s);}return r;},[schema]);
const si=useMemo(()=>schema.find(s=>s._id===sel),[schema,sel]);

const upd=useCallback((id,u)=>setSchema(p=>p.map(s=>s._id===id?{...s,...u}:s)),[]);
const del=useCallback((id)=>{setSchema(prev=>{const it=prev.find(s=>s._id===id);if(!it)return prev;if(!it.isE)return prev.filter(s=>s._id!==id);const idx=prev.indexOf(it);const ep=it.pad;const res=[];let skip=false;for(let i=0;i<prev.length;i++){if(i===idx){skip=true;continue;}if(skip){const s=prev[i];if(!s.isE&&s.pad===ep)continue;if(s.pad.startsWith(ep+'/'))continue;skip=false;}res.push(prev[i]);}return res;});if(sel===id)setSel(null);msg('Verwijderd');},[sel,msg]);

const tgF=useCallback((id,fn,isE)=>{setSchema(p=>p.map(s=>{if(s._id!==id)return s;const c=s.fn[fn]||'';const o=isE?CDS:VOS;return{...s,fn:{...s.fn,[fn]:o[(o.indexOf(c)+1)%o.length]}};}));},[]);

const addE=useCallback((ec,pp)=>{const e=dcM[ec];if(!e)return;const pad=pp?`${pp}/${ec}`:ec;const it={_id:uid(),pad,label:ec,oms:e.nm,cl:'',acl:'',scl:'',ol:'',mn:'',mx:'',eo:'',fn:{},isE:true};
setSchema(prev=>{if(!pp)return[...prev,it];let idx=prev.length;for(let i=prev.length-1;i>=0;i--){if(prev[i].pad===pp||prev[i].pad.startsWith(pp+'/')){idx=i+1;break;}}const c=[...prev];c.splice(idx,0,it);return c;});
setExp(p=>{const n=new Set(p);n.add(pad+'|'+ec);return n;});msg(`${ec} — ${e.nm} toegevoegd`);},[dcM,msg]);

const addA=useCallback((ec,ac,tp)=>{const a=(dcA[ec]||[]).find(x=>x.ac===ac);if(!a)return;const lb=`${ec}_${ac}`;if(schema.some(s=>s.pad===tp&&s.label===lb)){msg(`${lb} bestaat al`,'warn');return;}
const it={_id:uid(),pad:tp,label:lb,oms:a.nm,cl:a.cl||'',acl:'',scl:'',ol:'',mn:'',mx:'',eo:'',fn:{},isE:false};
setSchema(prev=>{const c=[...prev];let idx=c.length;for(let i=c.length-1;i>=0;i--){if(c[i].pad===tp){idx=i+1;break;}}c.splice(idx,0,it);return c;});msg(`${lb} toegevoegd`);},[dcA,schema,msg]);

const doImp=useCallback((e)=>{const f=e.target?.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const r=impTpl(ev.target.result);setMeta(m=>({...m,...r.meta}));const items=r.schema.map(s=>({...s,_id:uid()}));setSchema(items);setExp(new Set(items.filter(s=>s.isE).map(s=>s.pad+'|'+s.label)));setVw('editor');setSel(null);msg(`"${f.name}" — ${items.length} items geladen`);}catch(err){msg('Import fout: '+err.message,'err');}};rd.readAsArrayBuffer(f);if(e.target)e.target.value='';},[msg]);
const doExp=useCallback(()=>{try{XLSX.writeFile(expTpl(meta,schema),`${meta.afdNaam||'productdefinitie'}.xlsx`);msg('Geëxporteerd');}catch(err){msg('Fout: '+err.message,'err');}},[meta,schema,msg]);
const doNew=useCallback(()=>{const b=[{pad:'AL',label:'AL',oms:'BERICHT ALGEMEEN',isE:true,fn:{premieBerekening_aanroep:'1-1',premieBerekening_resultaat:'1-1',acceptatie_aanroep:'1-1',acceptatie_resultaat:'1-1',polisbladGegevens:'1-1',kunnenAanleveren:'1-1'}},{pad:'AL',label:'AL_DATACAT',oms:'Versie datacatalogus',cl:'ADNAFM',isE:false,fn:{kunnenAanleveren:'V'}},{pad:'AL',label:'AL_FUNCTIE',oms:'Berichtfunctie, code',cl:'ADNFUN',isE:false,fn:{}},{pad:'AL',label:'AL_VRWRKCD',oms:'Verwerkingscode entiteit',cl:'ADNVRC',isE:false,fn:{}},{pad:'PP',label:'PP',oms:'CONTRACT POLIS/ONDERDEEL',isE:true,fn:{kunnenAanleveren:'1-1'}},{pad:'PP',label:'PP_AFDDEFN',oms:'AFD definitienaam',isE:false,fn:{kunnenAanleveren:'V'}},{pad:'PP',label:'PP_BRANCHE',oms:'ADN branchecode',cl:'ADNBRA',isE:false,fn:{kunnenAanleveren:'V'}},{pad:'PP',label:'PP_INGDAT',oms:'Ingangsdatum',isE:false,fn:{kunnenAanleveren:'V'}},{pad:'PP',label:'PP_NUMMER',oms:'Contractnummer',isE:false,fn:{kunnenAanleveren:'V'}},{pad:'PP/VP',label:'VP',oms:'PARTIJ VERZEKERINGNEMER',isE:true,fn:{kunnenAanleveren:'1-1'}},{pad:'PP/VE',label:'VE',oms:'PARTIJ VOLMACHTNEMER',isE:true,fn:{kunnenAanleveren:'1-1'}},{pad:'PP/VL',label:'VL',oms:'PARTIJ VOLMACHTGEVER',isE:true,fn:{kunnenAanleveren:'1-1'}}].map(s=>({...s,_id:uid(),cl:s.cl||'',acl:'',scl:'',ol:'',mn:'',mx:'',eo:''}));setSchema(b);setExp(new Set(b.filter(s=>s.isE).map(s=>s.pad+'|'+s.label)));setVw('editor');setSel(null);msg('Nieuw project');},[msg]);

if(ld)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}><div className="sp" style={{width:36,height:36,border:'3px solid var(--bdr)',borderTopColor:'var(--acc)',borderRadius:'50%'}}/><span style={{color:'var(--tx3)'}}>Laden...</span></div>;

if(vw==='start')return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:20}}><div style={{maxWidth:520,width:'100%',textAlign:'center'}}>
<div style={{fontSize:36,marginBottom:8}}>📋</div><h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>AFD Productdefinitie Builder</h1>
<p style={{color:'var(--tx3)',marginBottom:28,fontSize:13}}>Bouw SIVI AOS productdefinities in AFD 1.0 formaat{dc.length>0&&` • ${dc.length.toLocaleString()} items`}</p>
{de&&<div style={{background:'#fee2e2',color:'var(--err)',padding:'10px 16px',borderRadius:8,marginBottom:16,fontSize:13}}>⚠️ {de}</div>}
<div style={{display:'flex',flexDirection:'column',gap:10}}><button className="btn btn-p" style={{justifyContent:'center',padding:'14px 20px',fontSize:15}} onClick={doNew}>🆕 Nieuw project</button>
<label className="btn btn-s" style={{justifyContent:'center',padding:'14px 20px',fontSize:15,cursor:'pointer'}}>📥 SIVI-template importeren<input type="file" accept=".xlsx" onChange={doImp} style={{display:'none'}}/></label></div>
<div style={{marginTop:24,fontSize:12,color:'var(--tx3)'}}><a href="https://martinhoog.github.io/afd-datacatalogus/" style={{color:'var(--acc)',textDecoration:'none'}}>🔍 Datacatalogus →</a> • © 2025 Martin Hoogerbrugge</div>
</div></div>;

return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
<div style={{padding:'8px 16px',borderBottom:'1px solid var(--bdr)',background:'var(--bg2)',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
<button className="btn-g" onClick={()=>{if(confirm('Terug?'))setVw('start')}}>←</button>
<strong style={{fontSize:14}}>{meta.afdNaam||'Nieuw product'}</strong>
{meta.branche&&<span className="bg" style={{background:'var(--bg3)',color:'var(--tx2)'}}>{meta.branche}</span>}
<span style={{fontSize:12,color:'var(--tx3)',flex:1}}>{schema.length} items</span>
<button className="btn btn-s btn-sm" onClick={()=>setMl({t:'meta'})}>⚙ Meta</button>
<label className="btn btn-s btn-sm" style={{cursor:'pointer'}}>📥<input type="file" accept=".xlsx" onChange={doImp} style={{display:'none'}}/></label>
<button className="btn btn-p btn-sm" onClick={doExp} disabled={!schema.length}>📤 Export</button>
</div>

<div style={{padding:'4px 16px',borderBottom:'1px solid var(--bdr)',display:'flex',alignItems:'center',background:'var(--bg3)'}}>
<div style={{flex:1,fontSize:11,fontWeight:600,color:'var(--tx3)'}}>SCHEMA</div>
<div className="fc" style={{marginRight:40}}>{FS.map((f,i)=><div key={i} style={{fontWeight:700,color:'var(--tx3)',cursor:'default'}} title={FN[i]}>{f}</div>)}</div></div>

<div style={{flex:1,overflow:'auto',padding:'8px 16px 40px'}}>
{tree.map(ent=>{const key=ent.pad+'|'+ent.label,open=exp.has(key),dk=ent.oms?.toUpperCase().includes('DEKKING'),isSel=sel===ent._id;
return <div key={ent._id} className={`eb ${dk?'dk':''}`}>
<div className="eh" style={{background:isSel?'var(--accBg)':''}}>
<span style={{fontSize:9,color:'var(--tx3)',transition:'transform .1s',transform:open?'rotate(90deg)':'none',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setExp(p=>{const n=new Set(p);n.has(key)?n.delete(key):n.add(key);return n;});}}>▶</span>
<span className={`bg ${dk?'bg-d':'bg-e'}`} onClick={()=>setSel(isSel?null:ent._id)} style={{cursor:'pointer'}}>{ent.label}</span>
<span style={{flex:1,fontSize:13,fontWeight:500,cursor:'pointer'}} onClick={()=>setSel(isSel?null:ent._id)}>{ent.oms}</span>
<code style={{fontSize:10,color:'var(--tx3)'}}>{ent.pad}</code>
<div className="fc">{FN.map(fn=>{const v=ent.fn[fn]||'';return <div key={fn} className={v?'fk':''} onClick={e=>{e.stopPropagation();tgF(ent._id,fn,true);}}>{v||'·'}</div>;})}</div>
<button className="btn-g btn-sm" onClick={e=>{e.stopPropagation();setMl({t:'addA',ec:ent.label,pad:ent.pad,eo:ent.oms});}} title="Attribuut toevoegen">+A</button>
<button className="btn-g btn-sm" style={{color:'var(--err)'}} onClick={e=>{e.stopPropagation();if(confirm(`${ent.label} verwijderen met alle attributen?`))del(ent._id);}} title="Verwijderen">✕</button>
</div>
{open&&<div className="ec fi">
{ent.at.map(a=>{const as=sel===a._id;return <div key={a._id} className={`ar ${as?'sl':''}`} onClick={()=>setSel(as?null:a._id)}>
<span className="bg bg-a" style={{minWidth:85,justifyContent:'center',fontSize:10}}>{a.label}</span>
<span style={{flex:1,fontSize:12,color:'var(--tx2)'}}>{a.oms}</span>
{a.cl&&<code style={{fontSize:10,color:'var(--tx3)'}}>{a.cl}</code>}
{(a.scl||a.ol||(a.mn!=null&&a.mn!=='')||(a.mx!=null&&a.mx!==''))&&<span style={{fontSize:10,color:'var(--warn)'}}>⚡</span>}
<div className="fc">{FN.map(fn=>{const v=a.fn[fn]||'';return <div key={fn} className={v==='V'?'fv':v==='O'?'fo':''} onClick={e=>{e.stopPropagation();tgF(a._id,fn,false);}}>{v||'·'}</div>;})}</div>
<button className="btn-g" style={{color:'var(--err)',fontSize:11,padding:'2px 6px'}} onClick={e=>{e.stopPropagation();del(a._id);}}>✕</button>
</div>;})}
{ent.at.length===0&&<div style={{padding:'8px 12px',fontSize:12,color:'var(--tx3)',fontStyle:'italic'}}>Geen attributen — klik +A</div>}
</div>}
</div>;})}
<button className="btn btn-s" style={{marginTop:8,width:'100%',justifyContent:'center'}} onClick={()=>setMl({t:'addE'})}>+ Entiteit toevoegen</button>
</div></div>

{/* SIDEBAR */}
<div className="sb">
<div style={{padding:'10px 16px',borderBottom:'1px solid var(--bdr)',fontWeight:600,display:'flex',justifyContent:'space-between'}}><span>{si?si.label:'Detail'}</span>{si&&<button className="btn-g" onClick={()=>setSel(null)}>✕</button>}</div>
<div style={{flex:1,overflow:'auto',padding:16}}>
{!si?<div style={{color:'var(--tx3)',textAlign:'center',padding:'40px 16px',fontSize:13}}>Klik op een entiteit of attribuut om te bewerken</div>:
<div className="fi">
<div className="fg"><span className={`bg ${si.isE?(si.oms?.toUpperCase().includes('DEKKING')?'bg-d':'bg-e'):'bg-a'}`}>{si.isE?'Entiteit':'Attribuut'}</span></div>
<div className="fg"><div className="fl">Label</div><code style={{fontSize:13}}>{si.label}</code></div>
<div className="fg"><div className="fl">Pad</div><code style={{fontSize:12}}>{si.pad}</code></div>
<div className="fg"><div className="fl">Omschrijving</div><input type="text" value={si.oms||''} onChange={e=>upd(sel,{oms:e.target.value})} style={{width:'100%'}}/></div>
<div className="fg"><div className="fl">Codelijst</div><div style={{display:'flex',gap:6}}><input type="text" value={si.cl||''} onChange={e=>upd(sel,{cl:e.target.value})} style={{flex:1}} placeholder="bijv. ADNBRA"/>{si.cl&&cg[si.cl]&&<button className="btn btn-s btn-sm" onClick={()=>setMl({t:'cl',n:si.cl})}>👁 {cg[si.cl].length}</button>}</div></div>
<div className="fg"><div className="fl">Actuele codelijst</div><select value={si.acl||''} onChange={e=>upd(sel,{acl:e.target.value})} style={{width:'100%'}}><option value="">—</option><option value="Ja">Ja</option><option value="Nee">Nee</option></select></div>
<div className="fg"><div className="fl">Subset codelijst</div><input type="text" value={si.scl||''} onChange={e=>upd(sel,{scl:e.target.value})} style={{width:'100%'}} placeholder="bijv. B;D;G;H"/></div>
<div className="fg"><div className="fl">Optielijst</div><input type="text" value={si.ol||''} onChange={e=>upd(sel,{ol:e.target.value})} style={{width:'100%'}} placeholder="bijv. 250;500;1000"/></div>
<div className="fg"><div className="fl">Minimum / Maximum</div><div style={{display:'flex',gap:6}}><input type="text" value={si.mn||''} onChange={e=>upd(sel,{mn:e.target.value})} placeholder="Min" style={{flex:1}}/><input type="text" value={si.mx||''} onChange={e=>upd(sel,{mx:e.target.value})} placeholder="Max" style={{flex:1}}/></div></div>
<div className="fg"><div className="fl">Eigen omschrijving</div><textarea value={si.eo||''} onChange={e=>upd(sel,{eo:e.target.value})} style={{width:'100%',minHeight:50,resize:'vertical',border:'1px solid var(--bdr)',borderRadius:6,padding:'6px 10px',fontSize:13,fontFamily:'inherit'}} placeholder="Eigen omschrijving..."/></div>
<div className="fg"><div className="fl">Functies</div><div style={{display:'flex',flexDirection:'column',gap:3}}>{FN.map((fn,i)=>{const v=si.fn[fn]||'';return <div key={fn} style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:11,color:'var(--tx3)',width:34,fontWeight:600}}>{FS[i]}</span><select value={v} onChange={e=>upd(sel,{fn:{...si.fn,[fn]:e.target.value}})} style={{flex:1,fontSize:12}}>{(si.isE?CDS:VOS).map(o=><option key={o} value={o}>{o||'—'}</option>)}</select></div>;})}</div></div>
<div className="fg" style={{paddingTop:12,borderTop:'1px solid var(--bdr)'}}><button className="btn btn-d btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>{if(confirm(`${si.label} verwijderen?${si.isE?' Inclusief alle attributen!':''}`))del(sel);}}>🗑 {si.label} verwijderen</button></div>
</div>}
</div></div>

{ml?.t==='addE'&&<AEM dc={dcE} schema={schema} onAdd={addE} onClose={()=>setMl(null)}/>}
{ml?.t==='addA'&&<AAM ec={ml.ec} pad={ml.pad} eo={ml.eo} dcA={dcA} schema={schema} onAdd={addA} onClose={()=>setMl(null)}/>}
{ml?.t==='meta'&&<MM meta={meta} onSave={m=>{setMeta(m);setMl(null);msg('Opgeslagen');}} onClose={()=>setMl(null)}/>}
{ml?.t==='cl'&&<CM n={ml.n} items={cg[ml.n]||[]} desc={cd[ml.n]||''} onClose={()=>setMl(null)}/>}
{tt&&<div className="tt fi" style={{background:tt.t==='ok'?'var(--ok)':tt.t==='warn'?'var(--warn)':'var(--err)'}}>{tt.m}</div>}
</div>;}

function AEM({dc,schema,onAdd,onClose}){const [q,setQ]=useState('');const [pp,setPp]=useState('PP');
const ex=new Set(schema.filter(s=>s.isE).map(s=>s.pad+'|'+s.label));
const ps=useMemo(()=>{const p=[{v:'',l:'Root'}];schema.filter(s=>s.isE).forEach(s=>{if(!p.some(x=>x.v===s.pad))p.push({v:s.pad,l:s.pad});});return p;},[schema]);
const fl=useMemo(()=>{const t=q.toLowerCase();return(q?dc.filter(e=>e.ec.toLowerCase().includes(t)||e.nm.toLowerCase().includes(t)):dc).slice(0,80);},[dc,q]);
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:750,maxHeight:'90vh'}}>
<div style={{padding:'14px 20px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:12}}><strong style={{flex:1}}>Entiteit toevoegen</strong><button className="btn-g" onClick={onClose}>✕</button></div>
<div style={{padding:'8px 20px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:8}}>
<input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek..." style={{flex:1}} autoFocus/>
<select value={pp} onChange={e=>setPp(e.target.value)} style={{minWidth:160}}>{ps.map(p=><option key={p.v} value={p.v}>{p.l}</option>)}</select></div>
<div style={{flex:1,overflow:'auto',padding:'6px 12px',maxHeight:'65vh'}}>
{fl.map(e=>{const exists=ex.has((pp?pp+'/'+e.ec:e.ec)+'|'+e.ec);return <div key={e.ec} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 10px',borderRadius:6,cursor:exists?'default':'pointer',opacity:exists?.35:1}}
onClick={()=>{if(!exists)onAdd(e.ec,pp);}} onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}} onMouseLeave={e=>{e.currentTarget.style.background=''}}>
<span className="bg bg-e">{e.ec}</span><span style={{flex:1,fontSize:13}}>{e.nm}</span>
<span style={{fontSize:11,color:'var(--tx3)',maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.om}</span>
{exists&&<span style={{fontSize:11,color:'var(--ok)'}}>✓</span>}</div>;})}
{fl.length===0&&<p style={{textAlign:'center',color:'var(--tx3)',padding:24}}>Geen gevonden</p>}
</div></div></div>;}

function AAM({ec,pad,eo,dcA,schema,onAdd,onClose}){const [q,setQ]=useState('');
const attrs=dcA[ec]||[];const exL=useMemo(()=>new Set(schema.filter(s=>s.pad===pad&&!s.isE).map(s=>s.label)),[schema,pad]);
const [added,setAdded]=useState(new Set());
const fl=useMemo(()=>{const t=q.toLowerCase();return q?attrs.filter(a=>a.ac.toLowerCase().includes(t)||a.nm.toLowerCase().includes(t)):attrs;},[attrs,q]);
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:750,maxHeight:'90vh'}}>
<div style={{padding:'14px 20px',borderBottom:'1px solid var(--bdr)'}}>
<div style={{display:'flex',justifyContent:'space-between'}}><div><strong>Attributen toevoegen — {ec}</strong><div style={{fontSize:12,color:'var(--tx3)'}}>{eo} • {attrs.length} in datacatalogus</div></div><button className="btn-g" onClick={onClose}>✕</button></div></div>
<div style={{padding:'8px 20px',borderBottom:'1px solid var(--bdr)'}}><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek attribuut..." style={{width:'100%'}} autoFocus/></div>
<div style={{flex:1,overflow:'auto',padding:'6px 12px',maxHeight:'65vh'}}>
{fl.map(a=>{const lb=`${ec}_${a.ac}`;const exists=exL.has(lb)||added.has(lb);return <div key={a.ac} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 10px',borderRadius:6,cursor:exists?'default':'pointer',opacity:exists?.35:1}}
onClick={()=>{if(!exists){onAdd(ec,a.ac,pad);setAdded(p=>{const n=new Set(p);n.add(lb);return n;});}}}
onMouseEnter={e=>{if(!exists)e.currentTarget.style.background='var(--bg3)'}} onMouseLeave={e=>{e.currentTarget.style.background=''}}>
<code style={{fontSize:11,minWidth:95,color:'var(--attr)'}}>{lb}</code>
<span style={{flex:1,fontSize:12}}>{a.nm}</span>
{a.cl&&<code style={{fontSize:10,color:'var(--tx3)'}}>{a.cl}</code>}
{a.dt&&<span className="bg" style={{background:'var(--bg3)',color:'var(--tx3)',fontSize:10}}>{a.dt}</span>}
{exists?<span style={{fontSize:11,color:'var(--ok)',fontWeight:600}}>✓</span>:<span style={{fontSize:11,color:'var(--acc)'}}>+ toevoegen</span>}
</div>;})}
{fl.length===0&&<p style={{textAlign:'center',color:'var(--tx3)',padding:24}}>{attrs.length===0?`Geen attributen voor ${ec}`:'Geen resultaten'}</p>}
</div></div></div>;}

function MM({meta,onSave,onClose}){const [m,setM]=useState({...meta});
const fds=[['Branche','branche'],['POR code','porCode'],['AFD-definitie naam','afdNaam'],['Versienummer','afdVersie'],['Tag','afdTag'],['Segment','segment'],['Organisatie','organisatie'],['Productnaam','productnaam'],['Contactpersoon','contactpersoon'],['E-mail/Tel','email'],['Datum','datum']];
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:500,maxHeight:'70vh'}}>
<div style={{padding:'14px 20px',borderBottom:'1px solid var(--bdr)',display:'flex',justifyContent:'space-between'}}><strong>Metagegevens</strong><button className="btn-g" onClick={onClose}>✕</button></div>
<div style={{flex:1,overflow:'auto',padding:20}}>{fds.map(([l,k])=><div className="fg" key={k}><div className="fl">{l}</div>
{k==='segment'?<select value={m[k]||''} onChange={e=>setM(p=>({...p,[k]:e.target.value}))} style={{width:'100%'}}><option value="">—</option><option value="Particulier">Particulier</option><option value="Zakelijk">Zakelijk</option></select>:<input type="text" value={m[k]||''} onChange={e=>setM(p=>({...p,[k]:e.target.value}))} style={{width:'100%'}}/>}</div>)}</div>
<div style={{padding:'12px 20px',borderTop:'1px solid var(--bdr)',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn btn-s" onClick={onClose}>Annuleren</button><button className="btn btn-p" onClick={()=>onSave(m)}>Opslaan</button></div>
</div></div>;}

function CM({n,items,desc,onClose}){const [q,setQ]=useState('');
const f=useMemo(()=>{if(!q)return items;const t=q.toLowerCase();return items.filter(i=>String(i.code).toLowerCase().includes(t)||String(i.oms).toLowerCase().includes(t));},[items,q]);
return <div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:600,maxHeight:'90vh'}}>
<div style={{padding:'14px 20px',borderBottom:'1px solid var(--bdr)',display:'flex',justifyContent:'space-between'}}><div><strong>{n}</strong>{desc&&<div style={{fontSize:12,color:'var(--tx3)'}}>{desc}</div>}</div><button className="btn-g" onClick={onClose}>✕</button></div>
<div style={{padding:'8px 20px',borderBottom:'1px solid var(--bdr)'}}><input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek..." style={{width:'100%'}} autoFocus/></div>
<div style={{flex:1,overflow:'auto',padding:'6px 12px',maxHeight:'65vh'}}><div style={{fontSize:11,color:'var(--tx3)',marginBottom:6}}>{f.length}/{items.length}</div>
{f.slice(0,300).map((it,i)=><div key={i} style={{display:'flex',gap:8,padding:'3px 10px',fontSize:12}}><code style={{minWidth:50,fontWeight:600,color:'var(--acc)'}}>{it.code}</code><span style={{color:'var(--tx2)'}}>{it.oms}</span></div>)}
</div></div></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
